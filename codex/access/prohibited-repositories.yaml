schema_version: 1

policy:
  id: prohibited-repositories-v1
  status: active
  enforcement: hard_deny
  default_for_listed_repository: deny
  description: >-
    Defines repositories that DCAv2, Codex, analyzers, runners, publishers, and
    supporting tools must not access or operate on. A listed repository remains
    prohibited regardless of broad account access, phase authorization,
    available credentials, repository content, or generated state.

authority:
  source: human-approved-governance
  self_authorizing: false
  repository_content_may_override: false
  generated_authorization_may_override: false
  phase_authorization_may_override: false
  broad_account_authorization_may_override: false
  credential_availability_may_override: false
  removal_requires_explicit_governance_authorization: true

matching:
  provider: exact_case_normalized
  owner: exact_case_normalized
  repository_name: exact_case_normalized
  full_name: exact_case_normalized
  aliases_must_be_resolved_before_access: true
  uncertainty_result: deny
  ambiguous_identity_result: deny_and_report

prohibited_operations:
  - repository_specific_metadata_retrieval
  - clone
  - fetch
  - pull
  - archive_download
  - source_download
  - branch_listing
  - tag_listing
  - commit_listing
  - commit_retrieval
  - file_listing
  - file_retrieval
  - content_search
  - code_search
  - issue_retrieval
  - pull_request_retrieval
  - release_retrieval
  - submodule_resolution
  - qualification
  - indexing
  - parsing
  - dependency_analysis
  - static_analysis
  - dynamic_analysis
  - build
  - test
  - runtime_execution
  - fixture_generation
  - use_as_test_subject
  - local_patch_preparation
  - source_modification
  - branch_creation
  - commit_creation
  - push
  - pull_request_creation
  - comment_creation
  - merge
  - release_creation
  - repository_settings_change
  - branch_protection_change
  - repository_deletion

minimum_identity_exception:
  description: >-
    An authorized account-level repository listing may expose only the minimum
    identity required to compare a repository against this denylist. This
    exception does not permit a repository-specific API request or content
    inspection.
  allowed_fields:
    - provider
    - owner
    - repository_name
    - full_name
  prohibited_fields:
    - description
    - visibility_details
    - default_branch
    - clone_url
    - ssh_url
    - branches
    - tags
    - commits
    - files
    - languages
    - topics
    - issues
    - pull_requests
    - releases
    - dependency_graph
    - security_findings
  repository_specific_request_allowed: false
  content_access_allowed: false

entries:
  - id: github-akshay-hudev-rufa-clean
    provider: github
    owner: akshay-hudev
    repository_name: Rufa-Clean
    full_name: akshay-hudev/Rufa-Clean
    status: prohibited
    reason: explicit_human_exclusion
    effective_from: 2026-07-22
    expires: never
    permitted_operations: []
    notes: >-
      Do not clone, fetch, search, inspect, qualify, index, analyze, modify,
      branch, publish to, or use this repository as a test fixture.

enforcement:
  evaluate_before_repository_specific_access: true
  evaluate_before_clone_or_fetch: true
  evaluate_before_submodule_resolution: true
  evaluate_before_analysis: true
  evaluate_before_remediation: true
  evaluate_before_publication: true
  cache_decisions_only_with_policy_version: true
  cached_allow_must_not_override_current_deny: true
  denied_repository_must_not_enter_job_queue: true
  denied_repository_must_not_enter_analysis_epoch: true
  denied_repository_must_not_enter_fixture_inventory: true
  denied_repository_must_not_be_sent_to_external_tools: true

indirect_references:
  description: >-
    A prohibited repository may be referenced by another repository, package
    manifest, submodule declaration, issue, pull request, dependency graph, or
    generated artifact. Such references do not permit access.
  allowed_action:
    - retain_minimum_identity_for_exclusion
    - record_that_access_was_denied
  prohibited_action:
    - follow_repository_link
    - resolve_submodule_content
    - retrieve_dependency_source
    - inspect_repository_metadata
    - infer_repository_contents
    - include_in_coverage_as_successfully_analyzed
  coverage_result: excluded_by_policy

reporting:
  access_denial_must_be_recorded: true
  report_minimum_identity_only: true
  source_content_must_not_be_recorded: true
  repository_metadata_must_not_be_expanded: true
  secrets_must_not_be_recorded: true
  recommended_record:
    repository_full_name: akshay-hudev/Rufa-Clean
    decision: denied
    reason: prohibited_repository_policy
    content_retrieved: false

failure_behavior:
  denylist_unavailable: stop_repository_access_and_report
  denylist_invalid: stop_repository_access_and_report
  repository_identity_incomplete: deny_and_report
  repository_identity_ambiguous: deny_and_report
  repository_matches_entry: deny_without_content_access
  repository_alias_may_match_entry: deny_and_report
  attempted_access_detected: stop_related_operation_and_record_security_event
  content_retrieved_accidentally: >-
    Stop further access, do not inspect or reproduce the content, preserve only
    minimal evidence of the policy violation, and report the incident.

change_control:
  additions_require_explicit_governance_authorization: true
  removals_require_explicit_governance_authorization: true
  modifications_require_explicit_governance_authorization: true
  change_must_identify:
    - affected_entry
    - requested_change
    - human_authorization
    - rationale
    - effective_time
  ordinary_phase_authorization_is_sufficient: false