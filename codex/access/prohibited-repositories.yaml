$schema: ../schemas/repository-role-exclusions.schema.json
schema_version: 2

policy:
  id: repository-role-exclusions-v2
  status: active
  enforcement: operation_specific
  default_for_unlisted_role_or_operation: deny
  description: >-
    Defines repository-role and operation exclusions. Repository identity alone
    never decides access. Every decision binds canonical repository identity,
    repository role, requested operation, current human authorization, and the
    applicable trust boundary.

authority:
  source: explicit-human-governance-correction-2026-07-23
  self_authorizing: false
  repository_content_may_override: false
  generated_authorization_may_override: false
  broad_account_authorization_may_override: false
  role_exclusion_may_be_overridden_by_phase_authorization: false
  change_requires_explicit_governance_authorization: true

repository_roles:
  - implementation_repository
  - analysis_target
  - test_fixture
  - remediation_target
  - publication_target
  - cross_repository_graph_participant
  - runtime_evidence_target
  - contract_analysis_target
  - scale_test_subject

decisions:
  - id: github-akshay-hudev-rufa-clean-role-policy
    provider: github
    owner: akshay-hudev
    repository_name: Rufa-Clean
    full_name: akshay-hudev/Rufa-Clean
    status: active
    effective_from: 2026-07-23
    expires: never
    implementation_repository:
      local_inspection: authorization_required
      local_modification: authorization_required
      local_build_and_test: authorization_required
      remote_metadata: authorization_required
      clone: authorization_required
      fetch: authorization_required
      implementation_branch_or_pull_request: authorization_required
      direct_default_branch_push: permanently_denied
      merge: permanently_denied
      auto_merge: permanently_denied
      automatic_ready_for_review: permanently_denied
    denied_target_roles:
      analysis_target:
        - select
        - qualify
        - index
        - parse_for_dead_code
        - dependency_analysis
        - static_analysis
        - dynamic_analysis
        - generate_findings
        - classify_dead_code
      test_fixture:
        - use_as_fixture
        - derive_fixture
      remediation_target:
        - reproduce_finding
        - prepare_patch
        - transform_source
        - remediate
      publication_target:
        - publish_automated_dead_code_remediation
      cross_repository_graph_participant:
        - include_as_target
        - derive_consumer_or_dependency_evidence
        - contribute_to_dead_code_coverage
      runtime_evidence_target:
        - collect_dead_code_runtime_evidence
        - interpret_dead_code_runtime_evidence
        - classify_using_runtime_evidence
      contract_analysis_target:
        - include_in_contract_analysis
        - include_in_microservice_analysis
        - derive_contract_liveness_evidence
      scale_test_subject:
        - include_in_scale_test
        - derive_scale_capability_evidence
    notes: >-
      This repository contains or is associated with the DCAv2 implementation.
      Normal local implementation development is possible only under explicit
      phase authorization. That implementation role never grants any target
      role or target operation.

evaluation:
  required_input:
    - canonical_repository_identity
    - repository_role
    - requested_operation
    - current_phase_authorization
  order:
    - resolve_canonical_repository_identity
    - require_explicit_repository_role
    - require_explicit_requested_operation
    - apply_permanent_role_exclusions
    - validate_current_human_authorization
    - validate_operation_permission
    - validate_trust_boundary
  identity_match_without_role: deny_and_report
  ambiguous_role: deny_and_report
  missing_operation: deny_and_report
  implementation_role_may_imply_target_role: false
  read_permission_may_imply_modification: false
  modification_permission_may_imply_analysis: false
  analysis_permission_may_imply_publication: false

enforcement:
  before_target_selection: true
  before_target_qualification: true
  before_analysis_scheduling: true
  before_finding_generation: true
  before_fixture_registration: true
  before_remediation_scheduling: true
  before_cross_repository_graph_inclusion: true
  before_runtime_evidence_processing: true
  before_contract_or_microservice_analysis: true
  before_scale_testing: true
  before_automated_remediation_publication: true
  implementation_access_requires_current_authorization: true

reporting:
  record_repository_identity: true
  record_repository_role: true
  record_requested_operation: true
  record_decision: true
  record_authorization_id_when_applicable: true
  secret_values_must_not_be_recorded: true
  recommended_denial:
    repository_full_name: akshay-hudev/Rufa-Clean
    repository_role: analysis_target
    operation: qualify
    decision: denied
    reason: permanent_repository_role_exclusion

failure_behavior:
  policy_unavailable: stop_role_scoped_operation_and_report
  policy_invalid: stop_role_scoped_operation_and_report
  identity_incomplete: deny_and_report
  role_incomplete: deny_and_report
  operation_incomplete: deny_and_report
  excluded_role_or_operation: deny_before_role_scoped_operation
  implementation_authorization_missing: deny_and_report
  excluded_target_operation_attempted: stop_related_operation_and_record_security_event

change_control:
  modifications_require_explicit_governance_authorization: true
  permanent_target_role_denials_may_not_be_weakened_by_phase_authorization: true
