$schema: ../schemas/github-repository-policy-v2.schema.json
schema_version: 2

policy:
  id: github-repository-policy-v2
  status: active
  provider: github
  default_decision: deny
  decision_model: repository_identity_role_operation
  description: >-
    Defines GitHub repository-access boundaries for DCAv2. Effective permission
    is the intersection of canonical repository identity, explicit repository
    role, requested operation, current human authorization, role exclusions,
    credential scope, trust-boundary policy, and permanent safety invariants.

authority:
  source: human-approved-governance
  self_authorizing: false
  authorization_file_may_broaden_policy: false
  generated_state_may_broaden_policy: false
  repository_content_may_broaden_policy: false

account_scope:
  allowed_owners:
    - akshay-hudev
  owner_match: exact_case_normalized
  default_for_allowed_owner: eligible_when_authorized
  require_role_exclusion_check: true
  require_phase_scope_check: true
  require_exact_repository_identity: true

repository_roles:
  implementation_repository:
    description: Repository containing the DCAv2 product implementation.
    local_inspection: authorization_required
    local_modification: authorization_required
    local_build_and_test: authorization_required
  analysis_target:
    description: Repository selected for dead-code qualification or analysis.
    selection: authorization_required
    qualification: authorization_required
    analysis: authorization_required
    finding_generation: authorization_required
  test_fixture:
    description: Repository used to validate DCAv2 analysis or remediation.
    use: authorization_required
  remediation_target:
    description: Repository whose dead-code finding may be transformed.
    use: finding_specific_authorization_required
  publication_target:
    description: Repository receiving automated dead-code remediation output.
    use: explicit_publication_authorization_required
  cross_repository_graph_participant:
    description: Repository included in dead-code relationship or consumer scope.
    use: authorization_required
  runtime_evidence_target:
    description: Repository whose runtime evidence informs dead-code decisions.
    use: authorization_required
  contract_analysis_target:
    description: Repository included in contract or microservice analysis.
    use: authorization_required
  scale_test_subject:
    description: Repository used as a scale-validation subject.
    use: authorization_required

standing_access:
  description: >-
    Repositories owned by akshay-hudev are eligible only for operations that
    are explicitly authorized and are not denied for the requested role.
  permission_inheritance: prohibited
  read_implies_write: false
  implementation_modification_implies_analysis_target: false
  analysis_permission_implies_remediation: false
  analysis_permission_implies_publication: false

role_exclusion_policy:
  file: codex/access/prohibited-repositories.yaml
  policy_id: repository-role-exclusions-v2
  precedence: permanent_role_operation_deny
  evaluate_identity_only: false
  required_decision_key:
    - canonical_repository_identity
    - repository_role
    - requested_operation
  phase_authorization_may_override_permanent_role_denial: false
  implementation_access_may_continue_when_authorized: true

repository_identity:
  required:
    - provider
    - owner
    - repository_name
    - full_name
  required_before_analysis:
    - requested_revision
    - resolved_immutable_commit
    - source_snapshot_identity
  required_before_remediation:
    - resolved_immutable_commit
    - finding_identity
    - exact_source_occurrence
    - evidence_digest
    - coverage_identity
    - policy_version

access_decision:
  evaluation_order:
    - verify_provider
    - verify_exact_repository_identity
    - require_repository_role
    - require_requested_operation
    - apply_repository_role_exclusion_policy
    - verify_latest_human_instruction
    - verify_current_phase_authorization
    - verify_operation_permission
    - verify_credential_permission
    - verify_runner_or_publisher_boundary
  uncertainty_result: deny
  missing_field_result: deny
  policy_conflict_result: deny_and_report
  stale_authorization_result: deny_and_report

credentials:
  availability_does_not_grant_permission: true
  use_requires_current_authorization: true
  least_privilege_required: true
  secrets_must_not_be_logged: true
  authenticated_remote_urls: prohibited
  trusted_credentials_in_untrusted_runner: prohibited

source_acquisition:
  mutable_branch_name_is_not_source_identity: true
  immutable_commit_required_for_targets: true
  credential_bearing_remote_must_be_removed_before_runner_execution: true
  untrusted_git_hooks_must_be_disabled: true
  host_git_credentials_must_not_be_mounted: true

analysis_execution:
  repository_content_is_untrusted: true
  approved_isolated_runner_required_for_target_commands: true
  role_exclusion_must_pass_before_analysis: true
  analyzer_failure_is_empty_success: false
  incomplete_coverage_may_be_reported_as_complete: false

remediation:
  analysis_permission_implies_remediation_permission: false
  confirmed_dead_implies_remediation_permission: false
  role_exclusion_must_pass_before_remediation: true

publication:
  role_exclusion_must_pass_before_publication: true
  trusted_publisher_required: true
  dedicated_branch_required: true
  draft_pull_request_only: true
  direct_default_branch_push: prohibited
  merge: prohibited
  auto_merge: prohibited
  automatic_ready_for_review: prohibited
  idempotency_required: true

external_operation_record:
  required: true
  required_fields:
    - authorization_id
    - provider
    - repository_full_name
    - repository_role
    - operation
    - result
    - external_state_modified
  prohibited_fields:
    - credential_value
    - private_key
    - authentication_header
    - credential_bearing_url

audit:
  access_decisions_must_be_recorded: true
  denied_role_operations_must_be_recorded: true
  historical_records_must_be_append_only: true
  secret_values_must_not_be_recorded: true

failure_behavior:
  repository_identity_uncertain: deny_and_report
  repository_role_uncertain: deny_and_report
  requested_operation_uncertain: deny_and_report
  role_operation_excluded: deny_and_report
  authorization_missing: deny_and_report
  authorization_expired: deny_and_report
  requested_operation_not_permitted: deny_and_report
