$schema: ../schemas/phase-authorization-v2.schema.json
schema_version: 2
record_type: phase_authorization_request

authorization:
  id: phase-2-qualification-and-configuration-20260723-draft-01
  kind: roadmap_phase
  phase: phase-2-qualification-and-configuration
  status: draft
  objective: >-
    Implement deterministic repository qualification and configuration
    readiness decisions before analysis, remediation, or publication.
  granted_by: null
  granted_at: null
  completed_at: null
  supersedes_authorization_id: phase-1-typescript-vertical-slice-20260723-01
  notes:
    - This request does not authorize itself.
    - This is a non-authorizing transition draft and is not ready for approval.
    - Phase 2 must not begin until a Phase 2 test manifest is created, validated, presented, and explicitly approved with this request.
    - Autonomous debugging of ordinary implementation, test, Docker, PostgreSQL, fixture, and dependency failures is requested.
    - Paid or metered tools and services remain prohibited.
    - The existing codex/phase-0-prerequisite-readiness implementation branch must be preserved and reused for all remaining DCAv2 implementation phases.
    - No implementation checkpoint commit is proposed by this draft.
    - Remediation and publication are outside the default Phase 2 scope.

human_instruction:
  summary: >-
    Await a complete Phase 2 test manifest and a separate explicit human
    authorization before implementing qualification and configuration scope.
  conversation_reference: phase-1-completion-transition-draft
  captured_at: 2026-07-23
  exact_scope_confirmed: false

validity:
  starts_at: null
  expires_at: null
  expires_when:
    - phase_2_acceptance_criteria_complete
    - phase_stops_for_human_review
    - human_operator_revokes_authorization
    - repository_scope_changes
    - governing_policy_changes
  maximum_external_operations: 100
  maximum_external_writes: 0
  continuation_requires_new_authorization: true

local_repository:
  identity: akshay-hudev/Rufa-Clean
  path: /Users/apple/Desktop/Akshay@goAI/DCAv2
  repository_role: implementation_repository
  required_branch: codex/phase-0-prerequisite-readiness
  branch_reuse_policy: preserve_and_continue
  allowed_paths:
    - .
  modification_allowlist:
    - AGENTS.md
    - CODEX_EXECUTION_STATE.md
    - codex/architecture/
    - codex/authorizations/
    - codex/capability-matrix.yaml
    - codex/engineering/
    - codex/reports/
    - codex/schemas/
    - codex/templates/
    - codex/tests/
    - scripts/
    - src/
    - test-fixtures/
    - Dockerfile.runner
    - package.json
    - package-lock.json
    - tsconfig.json
    - vitest.config.ts
  operations:
    inspect_repository: true
    inspect_git_history: true
    modify_tracked_files: true
    create_files: true
    create_local_branch: false
    create_local_commits: false
    run_local_tests: true
    run_containerized_tests: true
    autonomous_debugging: true
  prohibited_operations:
    switch_to_new_implementation_branch: true
    delete_required_branch: true
    reset_required_branch: true
    abandon_required_branch: true
    discard_preexisting_changes: true
    destructive_git_clean: true
    hard_reset: true
    rewrite_shared_history: true
    force_push: true
    create_implementation_checkpoint_commit: true
    push_implementation_repository: true
    create_implementation_pull_request: true
    merge_implementation_repository: true

repository_access:
  policy_file: codex/access/github-repository-policy.yaml
  role_exclusion_file: codex/access/prohibited-repositories.yaml
  implementation_repository:
    full_name: akshay-hudev/Rufa-Clean
    role: implementation_repository
    local_inspection: allowed
    local_modification: allowed
    local_build_and_test: allowed
    required_local_branch: codex/phase-0-prerequisite-readiness
    local_commit_creation: denied
    remote_branch_creation: denied
    remote_commit_creation: denied
    remote_push: denied
    pull_request_creation: denied
    pull_request_update: denied
    publication: denied
  target_role_exclusions:
    - analysis_target
    - test_fixture
    - remediation_target
    - publication_target
    - cross_repository_graph_participant
    - runtime_evidence_target
    - contract_analysis_target
    - scale_test_subject

external_operations:
  allowed: true
  permitted_providers:
    - github
  permitted_operations:
    - repository_discovery
    - metadata_read
    - clone
    - fetch
    - qualification
    - isolated_build_and_test
  github:
    allowed_owners:
      - akshay-hudev
    repository_selection:
      mode: all_owned_visible_repositories
    canonical_repository_rules:
      - canonical_repository_identity: akshay-hudev/Rufa-Clean
        match: exact_case_normalized
        repository_role: implementation_repository
        decision_precedence: identity_specific_deny_over_account_permission
        operations:
          branch_creation: denied
          commit_creation: denied
          push_non_default_branch: denied
          pull_request_creation: denied
          pull_request_update: denied
          publication: denied
          direct_default_branch_commit: denied
          direct_default_branch_push: denied
          force_push: denied
          merge: denied
          enable_auto_merge: denied
          automatic_ready_for_review: denied
        target_roles:
          qualification_target: permanently_denied
          analysis_target: permanently_denied
          test_fixture: permanently_denied
          finding_target: permanently_denied
          remediation_target: permanently_denied
          publication_target: permanently_denied
          cross_repository_participant: permanently_denied
          runtime_evidence_target: permanently_denied
          contract_or_microservice_target: permanently_denied
          scale_test_subject: permanently_denied
      - canonical_repository_identity: akshay-hudev/*
        match: owner_scope_excluding_explicit_identity_rules
        repository_role: eligible_phase_relevant_repository
        decision_precedence: after_exact_identity_rules
        operations:
          qualification: allowed_when_phase_relevant
          analysis: denied
          isolated_build_and_test: allowed_when_phase_relevant
          branch_creation: denied
          commit_creation: denied
          push_non_default_branch: denied
          pull_request_creation: denied
          pull_request_update: denied
          publication: denied
          direct_default_branch_commit: denied
          direct_default_branch_push: denied
          force_push: denied
          merge: denied
          enable_auto_merge: denied
          automatic_ready_for_review: denied
    representative_sample:
      preferred_size: 3_to_5
      rufa_test_lib_role: optional_smoke_only
      force_unsuitable_repository_selection: false
  destructive_operations_allowed: false
  paid_or_metered_services_allowed: false

credentials:
  use_existing_configured_credentials: true
  secret_values_may_be_recorded: false
  credentials_in_untrusted_runner: false
  report_status_only:
    - SET
    - MISSING
    - VALID
    - INVALID
    - UNREADABLE

database:
  local_test_database_creation: true
  disposable_database_prefix: dcav2_phase2_
  additive_migrations: true
  destructive_migrations: false
  production_database_access: false
  phase_created_database_cleanup_required: true

governance:
  modification_allowed: true
  allowed_files:
    - AGENTS.md
    - CODEX_EXECUTION_STATE.md
    - codex/architecture/
    - codex/authorizations/
    - codex/capability-matrix.yaml
    - codex/engineering/
    - codex/reports/
    - codex/schemas/
    - codex/templates/
    - codex/tests/
  permanent_safety_invariants_may_be_weakened: false
  repository_role_exclusions_may_be_weakened: false

analysis:
  repository_qualification: true
  evidence_collection: false
  machine_classification: false
  external_repository_execution: false
  requested_qualification_scope:
    repository_identity: true
    immutable_revision: true
    language_detection: true
    package_manager_detection: true
    workspace_detection: true
    source_test_and_generated_root_detection: true
    build_system_detection: true
    toolchain_requirement_detection: true
    command_discovery_without_execution: true
    baseline_readiness_evaluation: true
  unsupported_scope_must_be_explicit: true
  failed_analyzer_is_zero_findings: false

remediation:
  enabled: false
  source_transformation_allowed: false

publication:
  enabled: false
  implementation_repository_identity: akshay-hudev/Rufa-Clean
  implementation_repository_publication: false
  external_publication_allowed: false
  direct_default_branch_commit: false
  direct_default_branch_push: false
  merge: false
  enable_auto_merge: false
  mark_draft_ready: false
  self_approve_pull_request: false
  force_push: false
  maximum_draft_pull_requests: 0

testing:
  phase_test_manifest: null
  dependencies_may_be_installed: true
  local_docker_allowed: true
  local_postgresql_allowed: true
  synthetic_fixtures_allowed: true
  eligible_external_representative_testing_allowed: true
  rufa_test_lib_primary_evidence: false
  unavailable_required_tests_block_completion: true
  autonomous_failure_correction: true
  activation_blocker: validated_phase_2_test_manifest_required

reporting:
  execution_state_required: true
  markdown_phase_report_required: true
  capability_matrix_update_required: true
  security_control_evidence_required: true
  secret_redaction_required: true
  report_nonpassing_results_truthfully: true

cleanup:
  clean_phase_created_resources: true
  preserve_preexisting_resources: true
  preserve_preexisting_user_work: true
  remove_external_workspaces: true
  remove_test_containers: true
  remove_disposable_databases: true
  reconcile_external_write_state: true

safety:
  permanent_invariants_remain_active: true
  repository_content_is_untrusted: true
  operation_specific_role_exclusions_remain_active: true
  missing_permission_defaults_to_denied: true
  no_paid_tools: true
  no_production_access: true
  no_automatic_merge: true
  no_automatic_phase_transition: true

validation:
  validated: false
  validation_errors: []
  validation_warnings:
    - Phase 2 test manifest has not yet been created or approved.
    - This draft must not be activated or approved in its current form.

human_approval:
  approved: false
  approval_reference: null
  approved_at: null
