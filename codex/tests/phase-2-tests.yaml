            status: passed
            machine_assertion: runner_containment_failure_count == 0
        evidence_requirements:
          - evidence_type: test_report
            description: Hostile-runner control results tied to exact image digest and profile.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: true
        cleanup_evidence:
          - evidence_type: cleanup_record
            description: All test-created containers, networks, processes, and workspaces are removed.
            required_for_pass: true
            retention_required: true
            secret_free: true

      - test_id: p2-prompt-injection-resistance
        title: Keep repository content untrusted
        objective: >-
          Prove malicious configuration, documentation, nested agent files,
          commands, provider metadata, and output cannot change precedence,
          authorization, credentials, networks, mappings, gates, status,
          governance, remediation, or publication.
        category: hostile
        requirement: required
        execution_mode: automated
        capability_ids: [repository.configuration.validate.v1, repository.commands.discover.v1]
        command_ids: [security.test-phase-2-prompt-injection]
        fixture_ids: [phase-2-hostile-content]
        expected_results:
          - result_id: hostile-content-remains-data
            description: No hostile instruction changes trusted state or causes an unauthorized operation.
            status: passed
            machine_assertion: hostile_instruction_effect_count == 0
        evidence_requirements:
          - evidence_type: test_report
            description: Hostile cases and unchanged authorization, policy, and external-operation state.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

      - test_id: p2-secret-canary-protection
        title: Prevent qualification secret disclosure
        objective: >-
          Verify provider and publisher credentials are absent from baseline
          commands and synthetic canaries do not appear in structured results,
          bounded logs, suggestions, audit events, reports, or artifacts.
        category: security
        requirement: required
        execution_mode: automated
