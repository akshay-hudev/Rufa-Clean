  - group_id: phase-2-security
    title: Runner containment and hostile input
    purpose: >-
      Verify untrusted qualification content cannot escape the runner, obtain
      trusted credentials, alter authority, or leak synthetic secrets.
    execution_order: 60
    stop_group_on_failure: true
    tests:
      - test_id: p2-runner-isolation
        title: Enforce qualification runner isolation
        objective: >-
          Verify non-root execution, capability drop, no privileged mode,
          no Docker socket, host-filesystem confinement, network policy, cloud
          metadata denial, sanitized environment, resource/output/time limits,
          process-tree termination, and cleanup.
        category: security
        requirement: required
        execution_mode: automated
        capability_ids: [repository.baseline.evaluate.v1]
        command_ids: [security.test-phase-2-runner]
        runner_profile: isolated-typescript-runner
        network_profile: network-disabled
        fixture_ids: [phase-2-hostile-content]
        expected_results:
          - result_id: qualification-runner-contained
