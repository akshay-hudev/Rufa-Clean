  - group_id: phase-2-external
    title: Representative eligible-repository qualification
    purpose: >-
      Demonstrate bounded qualification generalization beyond one synthetic
      fixture without analyzing, remediating, or publishing.
    execution_order: 80
    stop_group_on_failure: false
    tests:
      - test_id: p2-external-representative-qualification
        title: Qualify representative eligible repositories
        objective: >-
          Discover and select approximately three to five structurally useful
          eligible akshay-hudev repositories when available, bind immutable
          revisions, qualify them in isolation, preserve unsupported or failed
          outcomes, and exclude Rufa-Clean before target metadata access.
        category: external
        requirement: conditional
        execution_mode: external
        activation:
          default_active: false
          all_of:
            - active authorization permits GitHub discovery, metadata, clone, fetch, qualification, and isolated baseline probes
            - configured GitHub App credential status is VALID
            - network access to GitHub is available
          reason: External source-provider access requires current explicit authorization and usable credentials.
        capability_ids:
          - repository.identity.validate.v1
          - repository.revision.resolve.v1
          - repository.profile.qualify.v1
        external_operations:
          - system_type: source_provider
            system_identity: github.com/akshay-hudev
            environment: external-read-only
            operation: discover_metadata_acquire_and_qualify_eligible_repositories
            authorization_required: true
            production_access: denied
            credential_capability: github-app-read
            network_profile: github-readonly
            cleanup_required: true
          - system_type: package_registry
            system_identity: registry.npmjs.org
            environment: external-public-read-only
            operation: download_public_dependencies_for_isolated_baseline_when_required
            authorization_required: true
            production_access: denied
            network_profile: npm-public-install-only
            cleanup_required: true
        credential_capabilities: [github-app-read]
        fixture_ids: [phase-2-external-representative]
        expected_results:
          - result_id: representative-qualification-truthful
            description: Eligible immutable revisions are qualified and every rejected or unsupported repository retains its reason.
            status: passed
            machine_assertion: rufa_clean_target_access_count == 0 && external_write_count == 0
        evidence_requirements:
          - evidence_type: external_operation_record
            description: Secret-free discovery, acquisition, immutable revision, qualification, and cleanup records.
            required_for_pass: true
            retention_required: true
            secret_free: true
          - evidence_type: coverage_record
            description: Selection, rejection, profile, limitation, and generalization evidence.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: external_state_reconciliation_required
        cleanup_required: true
        cleanup_evidence:
          - evidence_type: cleanup_record
            description: All acquired external workspaces and credential references are removed.
            required_for_pass: true
            retention_required: true
            secret_free: true

  - group_id: phase-2-reporting
    title: Capability, security, reporting, and cleanup
    purpose: >-
      Require evidence-backed matrices, truthful completion reporting,
      reproducible state, and verified cleanup.
    execution_order: 90
    stop_group_on_failure: true
    tests:
      - test_id: p2-capability-security-matrix
        title: Validate capability and security evidence
        objective: >-
          Require every Phase 2 capability and relevant security control to
          reference actual test evidence, valid phase/test/control IDs, valid
          paths, exact supported scope, and truthful status.
        category: governance
        requirement: required
        execution_mode: automated
        capability_ids:
          - repository.identity.validate.v1
          - repository.revision.resolve.v1
          - repository.profile.qualify.v1
          - repository.language.detect.v1
          - repository.package-manager.detect.v1
          - repository.workspace.detect.v1
          - repository.source-roots.discover.v1
          - repository.test-roots.discover.v1
          - repository.generated-roots.discover.v1
          - repository.build-system.detect.v1
          - repository.toolchain.requirements.v1
          - repository.commands.discover.v1
          - repository.configuration.validate.v1
          - repository.baseline.evaluate.v1
          - repository.capability-route.v1
        command_ids: [governance.validate-phase-2-evidence]
        fixture_ids: [phase-2-local-dcav2]
        expected_results:
          - result_id: matrices-evidence-backed
            description: All referenced IDs and paths resolve and no documentation-only control is reported validated.
            status: passed
            machine_assertion: invalid_or_unsupported_status_claim_count == 0
        evidence_requirements:
          - evidence_type: test_report
            description: Capability, security-control, identifier, schema, and path validation.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

      - test_id: p2-phase-report-truthfulness
        title: Produce a truthful Phase 2 report
        objective: >-
          Report every acceptance criterion, test, repository, profile,
          limitation, migration, security control, external operation,
          changed file, credential status, and cleanup result without treating
          unavailable, unsupported, failed, or skipped work as passed.
        category: governance
        requirement: required
        execution_mode: automated
        capability_ids: [repository.profile.qualify.v1]
        command_ids: [reporting.validate-phase-2-report]
        fixture_ids: [phase-2-local-dcav2]
        expected_results:
          - result_id: phase-2-report-complete
            description: The report is schema-valid, evidence-backed, bounded, and secret-free.
            status: passed
            machine_assertion: false_pass_or_unsupported_claim_count == 0
        evidence_requirements:
          - evidence_type: test_report
            description: Phase report schema, reference, redaction, and evidence reconciliation.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

      - test_id: p2-execution-state-handoff
        title: Record a reproducible Phase 2 handoff
        objective: >-
          Record authorization, branch, commits, worktree, governance hashes,
          commands, tests, profiles, unsupported scope, migrations, external
          operations, cleanup, limitations, and the smallest next human action.
        category: governance
        requirement: required
        execution_mode: automated
        command_ids: [reporting.validate-phase-2-state]
        fixture_ids: [phase-2-local-dcav2]
        expected_results:
          - result_id: phase-2-state-reproducible
            description: Another authorized session can resume from retained evidence without hidden context.
            status: passed
            machine_assertion: missing_required_handoff_field_count == 0
        evidence_requirements:
          - evidence_type: changed_file_record
            description: Validated execution-state handoff and changed-file reconciliation.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

      - test_id: p2-final-cleanup
        title: Verify Phase 2 resource cleanup
        objective: >-
          Reconcile and remove only Phase 2-created containers, networks,
          processes, workspaces, generated dependency homes, disposable
          databases, and temporary credential references while preserving
          pre-existing resources and all user work.
        category: integration
        requirement: required
        execution_mode: automated
        command_ids: [cleanup.verify-phase-2]
        fixture_ids:
          - phase-2-supported-typescript
          - phase-2-profile-variants
          - phase-2-hostile-content
          - phase-2-database
          - phase-2-external-representative
        expected_results:
          - result_id: phase-2-cleanup-complete
            description: No owned temporary resource remains and no unowned resource is altered.
            status: passed
            machine_assertion: owned_resource_leak_count == 0 && unowned_resource_mutation_count == 0
        evidence_requirements:
          - evidence_type: cleanup_record
            description: Resource inventory, ownership, cleanup action, and verified final state.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: true
        cleanup_evidence:
          - evidence_type: cleanup_record
            description: Final zero-owned-resource reconciliation.
            required_for_pass: true
            retention_required: true
            secret_free: true

completion_policy:
  required_tests: all_active_required_tests_must_pass
  conditional_tests: all_activated_conditional_tests_must_pass
  informational_tests: do_not_block
  unavailable_tests: block_phase
  skipped_tests: block_phase
  failed_cleanup: block_phase
  unknown_external_state: block_retry_and_completion
  security_failures: block_phase
  phase_completion_requires_current_authorization: true
  allow_completion_with_known_failures: false
  required_capability_statuses:
    - functional
  notes: >-
    Phase 2 is complete only when every active required test and every activated
    conditional test passes. Detection of an unsupported profile is valid
    behavior, but no unsupported profile may be reported ready or functional.
reporting:
  record_each_test: true
  record_unavailable_tests: true
  record_skipped_tests: true
  record_cleanup: true
  record_external_operations: true
  record_test_inputs: true
  record_test_environment: true
  redact_secrets: true
  prohibit_false_pass: true
  required_report_schema: codex/schemas/phase-report.schema.json
  required_audit_event_types:
    - phase-test-started
    - phase-test-completed
    - phase-test-failed
    - phase-test-blocked
    - phase-test-unavailable
    - phase-test-skipped
    - qualification-requested
    - repository-access-allowed
    - repository-access-denied
    - repository-role-exclusion-enforced
    - immutable-revision-resolved
    - source-acquisition-completed
    - repository-profile-selected
    - configuration-validated
    - configuration-rejected
    - tool-resolved
    - tool-unavailable
    - baseline-gate-completed
    - capability-routed
    - qualification-completed
    - qualification-failed
    - qualification-stale
    - phase-cleanup-completed
    - phase-cleanup-failed
metadata:
  owner: dcav2-governance
  created_at: 2026-07-23T16:57:51Z
  reviewers:
    - human-phase-authorizer
    - human-security-reviewer
  notes: >-
    This manifest is normative test configuration only. It does not activate
    Phase 2 or grant repository, credential, dependency-installation,
    external-operation, source-modification, remediation, publication, merge,
    infrastructure, or destructive-operation authority.
