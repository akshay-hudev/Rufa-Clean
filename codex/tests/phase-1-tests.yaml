$schema: ./phase-test-manifest.schema.json
schema_version: "1.0.0"
manifest_id: phase-1-tests
phase_id: phase-1-typescript-vertical-slice
title: Phase 1 TypeScript Vertical Slice Test Manifest
purpose: >-
  Defines the required governance, qualification, TypeScript analysis, evidence, coverage, classification, disposition, remediation, verification, publication, persistence, security, reporting, and handoff tests for the bounded Phase 1 TypeScript vertical slice. This manifest does not authorize implementation, repository access, credential use, dependency installation, remediation, publication, or destructive operations.
document_status: active
implementation_authorized_by_manifest: false
capability_ids:
  - repository.typescript.qualify.v1
  - runtime.node.resolve.v1
  - package-manager.npm.resolve.v1
  - inventory.typescript.module.v1
  - inventory.typescript.function.v1
  - analysis.typescript.imports.v1
  - analysis.typescript.references.v1
  - evidence.typescript.normalize.v1
  - coverage.typescript.single-package.v1
  - classification.typescript.private-function.v1
  - disposition.finding.record.v1
  - remediation.authorization.validate.v1
  - reproduction.typescript.private-function.v1
  - remediation.typescript.private-function-delete.v1
  - verification.typescript.gates.v1
  - patch.deterministic.generate.v1
  - publisher.trusted-draft-pr.v1
  - audit.phase-1-events.v1
  - reporting.phase-1-completion.v1
references:
  - path: AGENTS.md
    purpose: Defines repository-level operating instructions.
  - path: codex/core/01-instruction-precedence.md
    purpose: Defines instruction precedence and conflict handling.
  - path: codex/core/03-safety-invariants.md
    purpose: Defines permanent safety invariants.
  - path: codex/core/04-accuracy-and-evidence-policy.md
    purpose: Defines evidence-backed accuracy requirements.
  - path: codex/core/05-phase-authorization-protocol.md
    purpose: Defines phase authorization requirements.
  - path: codex/core/06-autonomy-and-stop-conditions.md
    purpose: Defines bounded autonomy and mandatory stop behavior.
  - path: codex/core/07-source-control-policy.md
    purpose: Defines source-control and draft-publication boundaries.
  - path: codex/core/08-secret-handling-policy.md
    purpose: Defines secret-handling requirements.
  - path: codex/core/09-prompt-injection-policy.md
    purpose: Defines handling of untrusted repository content.
  - path: codex/core/10-reporting-and-state-policy.md
    purpose: Defines truthful reporting and execution-state requirements.
  - path: codex/access/github-repository-policy.yaml
    purpose: Defines repository-operation access policy.
  - path: codex/access/prohibited-repositories.yaml
    purpose: Defines repositories that must never receive content access.
  - path: codex/architecture/evidence-model.md
    purpose: Defines normalized evidence and provenance.
  - path: codex/architecture/coverage-model.md
    purpose: Defines open-world coverage semantics.
  - path: codex/architecture/classification-policy.md
    purpose: Defines deterministic classification behavior.
  - path: codex/architecture/remediation-policy.md
    purpose: Defines remediation prerequisites and boundaries.
  - path: codex/architecture/trusted-publisher-policy.md
    purpose: Defines trusted publisher separation and draft-only behavior.
  - path: codex/architecture/audit-policy.md
    purpose: Defines audit-event requirements.
  - path: codex/engineering/structured-command-policy.md
    purpose: Defines trusted structured-command execution.
  - path: codex/engineering/runner-security-controls.md
    purpose: Defines untrusted runner security controls.
  - path: codex/engineering/database-evolution-policy.md
    purpose: Defines additive migration requirements.
  - path: codex/engineering/testing-policy.md
    purpose: Defines test execution and reporting policy.
  - path: codex/roadmap/phase-1-typescript-vertical-slice.md
    purpose: Defines Phase 1 scope and completion criteria.
  - path: codex/authorizations/current-phase-authorization.yaml
    purpose: Identifies whether Phase 1 execution is currently authorized.
defaults:
  default_runner_profile: isolated-typescript-runner
  default_network_profile: network-disabled
  default_timeout_seconds: 1200
  default_output_limit_bytes: 2097152
  default_retry_policy: no_retry
  unavailable_test_result: not_passed
  skipped_test_result: not_passed
  unexpected_error_result: failed
  cleanup_required: true
fixtures:
  - fixture_id: phase-1-local-dcav2
    fixture_type: local_repository
    description: >-
      The local DCAv2 repository at the exact source revision and worktree state recorded for the authorized Phase 1 execution.
    source_identity: local-dcav2-repository
    authorization_required: true
    cleanup_required: false
  - fixture_id: phase-1-typescript-private-function
    fixture_type: synthetic_repository
    description: >-
      A synthetic npm TypeScript repository containing one private module-level function with no supported references and several similarly named live functions used to verify exact identity and transformation behavior.
    source_identity: synthetic-typescript-private-function-fixture
    immutable_revision: fixture-version-1
    authorization_required: false
    tenant_scope: synthetic-phase-1-tenant
    cleanup_required: true
  - fixture_id: phase-1-typescript-live-function
    fixture_type: synthetic_repository
    description: >-
      A synthetic npm TypeScript repository containing direct calls, imported references, value references, callbacks, re-exports, tests, and dynamic uncertainty that must prevent an unsafe dead-code conclusion.
    source_identity: synthetic-typescript-live-function-fixture
    immutable_revision: fixture-version-1
    authorization_required: false
    tenant_scope: synthetic-phase-1-tenant
    cleanup_required: true
  - fixture_id: phase-1-typescript-broken-runner
    fixture_type: synthetic_repository
    description: >-
      A synthetic TypeScript repository whose declared compiler exists as a development dependency but is intentionally unavailable through the isolated runner configuration.
    source_identity: synthetic-typescript-broken-runner-fixture
    immutable_revision: fixture-version-1
    authorization_required: false
    tenant_scope: synthetic-phase-1-tenant
    cleanup_required: true
  - fixture_id: phase-1-hostile-typescript-content
    fixture_type: synthetic_repository
    description: >-
      A synthetic TypeScript repository containing prompt-injection attempts, command-like text, path traversal attempts, symbolic links, malicious package scripts, oversized output, and synthetic secret canaries.
    source_identity: synthetic-phase-1-hostile-content
    immutable_revision: fixture-version-1
    authorization_required: false
    contains_synthetic_secrets: true
    tenant_scope: synthetic-phase-1-tenant
    cleanup_required: true
  - fixture_id: phase-1-external-rufa-test-lib
    fixture_type: external_repository
    description: >-
      The separately authorized external fixture repository akshay-hudev/rufa-test-lib at an exact immutable commit. The intended finding target is the deliberately private function normalizeLegacyReference. Historical access does not activate this fixture.
    source_identity: akshay-hudev/rufa-test-lib
    authorization_required: true
    tenant_scope: authorized-phase-1-tenant
    cleanup_required: true
  - fixture_id: phase-1-provider-emulator
    fixture_type: provider_emulator
    description: >-
      An isolated source-provider emulator used to verify branch, draft pull request, idempotency, partial-state, and publisher-policy behavior without live provider access.
    source_identity: phase-1-source-provider-emulator
    immutable_revision: emulator-version-1
    authorization_required: false
    tenant_scope: synthetic-phase-1-tenant
    cleanup_required: true
  - fixture_id: phase-1-database
    fixture_type: database
    description: >-
      An isolated PostgreSQL-compatible Phase 1 database fixture containing Phase 0 state and synthetic tenants, findings, evidence, coverage, disposition, authorization, remediation, and audit records.
    source_identity: phase-1-postgresql-fixture
    immutable_revision: fixture-version-1
    authorization_required: false
    contains_synthetic_secrets: false
    tenant_scope: synthetic-phase-1-tenant
    cleanup_required: true
test_groups:
  - group_id: phase-1-authorization
    title: Phase authorization and scope
    purpose: >-
      Verify that Phase 1 work executes only under a current explicit authorization and that repository, finding, remediation, and publication permissions remain separate.
    execution_order: 10
    stop_group_on_failure: true
    tests:
      - test_id: p1-current-phase-authorization
        title: Validate current Phase 1 authorization
        objective: >-
          Confirm that execution proceeds only when the current authorization explicitly activates phase-1-typescript-vertical-slice and identifies the permitted repository, revision, operations, commands, credentials, tests, and stop conditions.
        category: governance
        requirement: required
        execution_mode: automated
        capability_ids:
          - repository.typescript.qualify.v1
        requirement_references:
          - path: codex/core/05-phase-authorization-protocol.md
          - path: codex/authorizations/current-phase-authorization.yaml
        required_permissions:
          - local-repository-read
        command_ids:
          - authorization.validate-phase-1
        runner_profile: governance-readonly-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-1-local-dcav2
        expected_results:
          - result_id: phase-1-authorization-valid
            description: >-
              The authorization is either a valid current Phase 1 authorization or execution is denied without running implementation commands.
            status: passed
            machine_assertion: unauthorized_phase_1_execution_count == 0
        evidence_requirements:
          - evidence_type: authorization_record
            description: Validated current authorization with secret-free capability metadata.
            schema_or_format: phase-authorization-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
          - evidence_type: policy_decision
            description: Phase activation decision and denied operation set.
            schema_or_format: phase-policy-decision-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false
        tags:
          - authorization
          - phase-1
          - default-deny
      - test_id: p1-operation-permission-separation
        title: Validate operation-permission separation
        objective: >-
          Confirm that analysis permission does not imply dependency installation, remediation, branch creation, publication, merge, infrastructure access, or destructive-operation permission.
        category: security
        requirement: required
        execution_mode: automated
        capability_ids:
          - remediation.authorization.validate.v1
          - publisher.trusted-draft-pr.v1
        required_permissions:
          - local-repository-read
        command_ids:
          - authorization.test-operation-separation
        runner_profile: governance-readonly-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-1-local-dcav2
        expected_results:
          - result_id: permissions-remain-independent
            description: >-
              Every tested operation requires its own matching permission and no permission is inferred from analysis access.
            status: passed
            machine_assertion: implicit_permission_escalation_count == 0
        evidence_requirements:
          - evidence_type: policy_decision
            description: Operation-specific authorization decision matrix.
            schema_or_format: operation-permission-matrix-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false
        tags:
          - authorization
          - least-privilege
      - test_id: p1-prohibited-repository-preflight
        title: Validate prohibited-repository denial before content access
        objective: >-
          Confirm that akshay-hudev/Rufa-Clean is rejected using canonical repository identity before any branch, commit, tree, source, qualification, analysis, remediation, or publication request occurs.
        category: security
        requirement: required
        execution_mode: automated
        capability_ids:
          - repository.typescript.qualify.v1
          - publisher.trusted-draft-pr.v1
        requirement_references:
          - path: codex/access/prohibited-repositories.yaml
          - path: codex/access/github-repository-policy.yaml
        required_permissions:
          - local-repository-read
        command_ids:
          - access-policy.test-prohibited-preflight
        runner_profile: governance-readonly-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-1-local-dcav2
        expected_results:
          - result_id: prohibited-repository-denied
            description: >-
              The prohibited decision is produced using minimum canonical identity metadata and no repository content request is emitted.
            status: passed
            machine_assertion: prohibited_repository_content_request_count == 0
        evidence_requirements:
          - evidence_type: policy_decision
            description: Repository preflight denial record.
            schema_or_format: repository-access-decision-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
          - evidence_type: audit_event
            description: Secret-free prohibited-repository denial event.
            schema_or_format: audit-event-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false
        tags:
          - prohibited-repository
          - preflight
  - group_id: phase-1-qualification
    title: TypeScript repository qualification
    purpose: >-
      Verify deterministic repository, Node.js, npm, source-root, configuration, command, and baseline qualification for the bounded Phase 1 profile.
    execution_order: 20
    stop_group_on_failure: true
    tests:
      - test_id: p1-supported-repository-qualification
        title: Qualify the supported npm TypeScript profile
        objective: >-
          Confirm that a single-package npm TypeScript repository with a supported Node.js version, supported compiler configuration, current dependency metadata, discoverable source root, and available required gates receives the ready status.
        category: functional
        requirement: required
        execution_mode: automated
        capability_ids:
          - repository.typescript.qualify.v1
          - runtime.node.resolve.v1
          - package-manager.npm.resolve.v1
        required_permissions:
          - local-command-execution
          - isolated-runner-execution
        command_ids:
          - qualification.typescript-single-package
        runner_profile: isolated-typescript-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-1-typescript-private-function
        expected_results:
          - result_id: supported-profile-ready
            description: >-
              The repository receives ready status with exact source, Node.js, npm, compiler, package, configuration, and command identities.
            status: passed
            machine_assertion: qualification_status == 'ready'
        evidence_requirements:
          - evidence_type: structured_result
            description: Complete TypeScript qualification record.
            schema_or_format: typescript-qualification-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
          - evidence_type: coverage_record
            description: Qualification-dimension completion record.
            schema_or_format: qualification-coverage-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: true
        cleanup_evidence:
          - evidence_type: cleanup_record
            description: Qualification runner workspace and processes were cleaned.
            schema_or_format: cleanup-record-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        tags:
          - qualification
          - typescript
          - npm
      - test_id: p1-node-resolution
        title: Validate deterministic Node.js resolution
        objective: >-
          Confirm that the selected Node.js executable comes from an approved runner or explicitly supported project toolchain and that a conflicting or missing version does not fall back silently to a host-global binary.
        category: functional
        requirement: required
        execution_mode: automated
        capability_ids:
          - runtime.node.resolve.v1
        required_permissions:
          - local-command-execution
          - isolated-runner-execution
        command_ids:
          - runtime.test-node-resolution
        runner_profile: isolated-typescript-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-1-typescript-private-function
          - phase-1-typescript-broken-runner
        expected_results:
          - result_id: node-resolution-deterministic
            description: >-
              Supported Node.js resolution is exact and unsupported or missing versions produce explicit non-ready statuses.
            status: passed
            machine_assertion: host_global_node_fallback_count == 0
        evidence_requirements:
          - evidence_type: command_record
            description: Node.js version and executable-resolution records.
            schema_or_format: tool-resolution-report-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: true
        cleanup_evidence:
          - evidence_type: cleanup_record
            description: Tool-resolution runner state was removed.
            schema_or_format: cleanup-record-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        tags:
          - node
          - tool-resolution
      - test_id: p1-npm-profile-resolution
        title: Validate npm manifest and lockfile resolution
        objective: >-
          Confirm that package.json and the supported npm lockfile are bound to exact content identities and that missing, conflicting, stale, or unexpectedly modified dependency inputs prevent ready status.
        category: functional
        requirement: required
        execution_mode: automated
        capability_ids:
          - package-manager.npm.resolve.v1
        required_permissions:
          - local-command-execution
          - isolated-runner-execution
        command_ids:
          - package-manager.test-npm-profile
        runner_profile: isolated-typescript-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-1-typescript-private-function
        expected_results:
          - result_id: npm-inputs-exact
            description: >-
              Manifest and lockfile identities are exact and no silent dependency-input selection or mutation occurs.
            status: passed
            machine_assertion: npm_dependency_input_error_count == 0
        evidence_requirements:
          - evidence_type: artifact_digest
            description: Manifest and lockfile content digests.
            schema_or_format: dependency-input-digest-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
          - evidence_type: structured_result
            description: npm profile resolution and conflict report.
            schema_or_format: npm-profile-resolution-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: true
        cleanup_evidence:
          - evidence_type: cleanup_record
            description: npm profile test workspace was cleaned.
            schema_or_format: cleanup-record-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        tags:
          - npm
          - lockfile
          - qualification
      - test_id: p1-typescript-compiler-resolution
        title: Validate project TypeScript compiler resolution
        objective: >-
          Confirm that the isolated runner resolves the exact approved project-local TypeScript compiler and that the known missing-tsc configuration defect produces an unavailable or blocked result rather than a passing gate.
        category: failure
        requirement: required
        execution_mode: automated
        capability_ids:
          - verification.typescript.gates.v1
        required_permissions:
          - local-command-execution
          - isolated-runner-execution
        command_ids:
          - runtime.test-typescript-compiler-resolution
        runner_profile: isolated-typescript-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-1-typescript-private-function
          - phase-1-typescript-broken-runner
        expected_results:
          - result_id: compiler-resolved-for-supported-profile
            description: >-
              The supported fixture resolves the exact approved project compiler.
            status: passed
            machine_assertion: supported_fixture_compiler_status == 'resolved'
          - result_id: unavailable-compiler-remains-nonpassing
            description: >-
              The broken runner fixture records the compiler as unavailable or blocked and never reports type checking as passed.
            status: passed
            machine_assertion: unavailable_compiler_false_pass_count == 0
        evidence_requirements:
          - evidence_type: command_record
            description: Compiler resolution and execution records for both fixtures.
            schema_or_format: structured-command-result-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
          - evidence_type: structured_result
            description: Compiler path, version, provenance, and failure classification.
            schema_or_format: typescript-compiler-resolution-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: true
        cleanup_evidence:
          - evidence_type: cleanup_record
            description: Compiler-resolution workspaces and processes were cleaned.
            schema_or_format: cleanup-record-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        tags:
          - typescript
          - compiler
          - runner-defect
      - test_id: p1-unsupported-profile-statuses
        title: Validate unsupported and ambiguous qualification outcomes
        objective: >-
          Confirm that unsupported package managers, conflicting project roots, unsupported compiler settings, missing lockfiles, malformed configuration, and inaccessible source roots produce explicit safe statuses.
        category: failure
        requirement: required
        execution_mode: automated
        capability_ids:
          - repository.typescript.qualify.v1
        required_permissions:
          - local-command-execution
          - isolated-runner-execution
        command_ids:
          - qualification.test-safe-failure-statuses
        runner_profile: isolated-typescript-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-1-hostile-typescript-content
        expected_results:
          - result_id: unsupported-scope-not-ready
            description: >-
              Every unsupported, ambiguous, inaccessible, or malformed profile receives a non-ready status with a bounded reason.
            status: passed
            machine_assertion: unsafe_ready_status_count == 0
        evidence_requirements:
          - evidence_type: test_report
            description: Qualification failure cases and resulting statuses.
            schema_or_format: qualification-failure-report-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: true
        cleanup_evidence:
          - evidence_type: cleanup_record
            description: Failure-case workspaces and processes were cleaned.
            schema_or_format: cleanup-record-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        tags:
          - qualification
          - unsupported
          - failure-semantics
  - group_id: phase-1-inventory-and-evidence
    title: TypeScript inventory and evidence
    purpose: >-
      Verify deterministic module and function identity, semantic reference evidence, import evidence, provenance, freshness, and failure semantics.
    execution_order: 30
    stop_group_on_failure: true
    tests:
      - test_id: p1-module-inventory
        title: Inventory TypeScript modules deterministically
        objective: >-
          Confirm that authored TypeScript modules are identified by repository, commit, package, source root, file path, module identity, and content digest while generated, test, vendored, and unsupported files remain distinguishable.
        category: functional
        requirement: required
        execution_mode: automated
        capability_ids:
          - inventory.typescript.module.v1
        required_permissions:
          - local-command-execution
          - isolated-runner-execution
        command_ids:
          - inventory.typescript-modules
        runner_profile: isolated-typescript-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-1-typescript-private-function
          - phase-1-typescript-live-function
        expected_results:
          - result_id: module-identities-deterministic
            description: >-
              Repeated inventory produces identical module identities and source-kind classifications.
            status: passed
            machine_assertion: nondeterministic_module_identity_count == 0
        evidence_requirements:
          - evidence_type: structured_result
            description: TypeScript module inventory with source-kind metadata.
            schema_or_format: typescript-module-inventory-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: true
        cleanup_evidence:
          - evidence_type: cleanup_record
            description: Module-inventory runners and workspaces were cleaned.
            schema_or_format: cleanup-record-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        tags:
          - inventory
          - modules
          - determinism
      - test_id: p1-function-identity
        title: Identify private functions exactly
        objective: >-
          Confirm that function identity includes repository, commit, package, module, file, source occurrence, qualified name, syntax shape, export state, and content digest.
        category: determinism
        requirement: required
        execution_mode: automated
        capability_ids:
          - inventory.typescript.function.v1
        required_permissions:
          - local-command-execution
          - isolated-runner-execution
        command_ids:
          - inventory.test-typescript-function-identity
        runner_profile: isolated-typescript-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-1-typescript-private-function
          - phase-1-typescript-live-function
        expected_results:
          - result_id: same-name-functions-remain-distinct
            description: >-
              Functions with the same name in different files, modules, scopes, or source occurrences receive distinct identities.
            status: passed
            machine_assertion: function_identity_collision_count == 0
          - result_id: repeated-inventory-stable
            description: >-
              Repeated inventory over identical source produces identical function identities.
            status: passed
            machine_assertion: repeated_function_identity_difference_count == 0
        evidence_requirements:
          - evidence_type: structured_result
            description: Function inventory and identity comparison.
            schema_or_format: typescript-function-inventory-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: true
        cleanup_evidence:
          - evidence_type: cleanup_record
            description: Function-identity test runners and workspaces were cleaned.
            schema_or_format: cleanup-record-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        tags:
          - functions
          - identity
          - determinism
      - test_id: p1-import-and-reference-evidence
        title: Resolve supported imports and references
        objective: >-
          Confirm that direct calls, value references, imported references, aliases, callbacks, exports, re-exports, and test references produce positive attributable evidence for the exact target symbol.
        category: functional
        requirement: required
        execution_mode: automated
        capability_ids:
          - analysis.typescript.imports.v1
          - analysis.typescript.references.v1
          - evidence.typescript.normalize.v1
        required_permissions:
          - local-command-execution
          - isolated-runner-execution
