completion_policy:
  required_tests: all_active_required_tests_must_pass
  conditional_tests: all_activated_conditional_tests_must_pass
  informational_tests: do_not_block
  unavailable_tests: block_phase
  skipped_tests: block_phase
  failed_cleanup: block_phase
  unknown_external_state: block_retry_and_completion
  security_failures: block_phase
  phase_completion_requires_current_authorization: true
  allow_completion_with_known_failures: false
  required_capability_statuses:
    - functional
  notes: >-
    Phase 1 is complete only when every active required test and every activated conditional test passes. Detection-only or partially supported outcomes may be reported truthfully for capability subsets, but they do not satisfy a functional Phase 1 completion claim unless the active authorization and completion scope explicitly define that narrower outcome.
reporting:
  record_each_test: true
  record_unavailable_tests: true
  record_skipped_tests: true
  record_cleanup: true
  record_external_operations: true
  record_test_inputs: true
  record_test_environment: true
  redact_secrets: true
  prohibit_false_pass: true
  required_report_schema: codex/schemas/phase-report.schema.json
  required_audit_event_types:
    - phase-test-started
    - phase-test-completed
    - phase-test-failed
    - phase-test-blocked
    - phase-test-unavailable
    - phase-test-skipped
    - qualification-completed
    - evidence-recorded
    - coverage-completed
    - finding-classified
    - disposition-recorded
    - remediation-authorized
    - finding-reproduced
    - baseline-gate-completed
    - transformation-completed
    - post-change-gate-completed
    - patch-created
    - publication-requested
    - publication-completed
    - publication-failed
    - phase-cleanup-completed
    - phase-cleanup-failed
metadata:
  owner: dcav2-governance
  reviewers:
    - human-phase-authorizer
    - human-security-reviewer
  notes: >-
    This manifest is normative test configuration. It does not activate Phase 1 and does not grant repository, credential, dependency-installation, external-operation, remediation, publication, merge, infrastructure, or destructive-operation authority.