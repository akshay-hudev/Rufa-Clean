$schema: ./phase-test-manifest.schema.json
schema_version: "1.0.0"
manifest_id: phase-3a-tests
phase_id: phase-3a-npm-monorepos
title: Phase 3A npm Monorepos Test Manifest
purpose: >-
  Defines the required governance, workspace discovery, package identity,
  package graph, package-aware roots, toolchain and command routing, coverage,
  cross-package evidence, baseline and remediation gates, security, persistence,
  external-representative, reporting, and cleanup evidence for the bounded
  Phase 3A npm-workspace capability. This manifest does not authorize
  implementation, repository access, credentials, dependency installation,
  remediation, publication, or destructive operations.
document_status: active
implementation_authorized_by_manifest: false
capability_ids:
  - repository.npm-workspace.qualify.v1
  - workspace.npm.discover.v1
  - workspace.npm.package-inventory.v1
  - workspace.npm.package-graph.v1
  - workspace.npm.package-roots.v1
  - analysis.typescript.cross-workspace-references.v1
  - analysis.typescript.package-exports.v1
  - analysis.typescript.project-references.v1
  - analysis.typescript.path-aliases.v1
  - coverage.typescript.npm-workspace.v1
  - verification.npm-workspace.package-gates.v1
  - verification.npm-workspace.aggregate-gates.v1
  - remediation.typescript.npm-workspace.private-function-delete.v1
references:
  - path: AGENTS.md
    purpose: Defines repository-level operating instructions.
  - path: codex/core/01-instruction-precedence.md
    purpose: Defines instruction precedence and conflict handling.
  - path: codex/core/03-safety-invariants.md
    purpose: Defines permanent safety invariants.
  - path: codex/core/04-accuracy-and-evidence-policy.md
    purpose: Defines evidence and coverage accuracy requirements.
  - path: codex/core/05-phase-authorization-protocol.md
    purpose: Defines phase authorization requirements.
  - path: codex/core/06-autonomy-and-stop-conditions.md
    purpose: Defines bounded autonomy and mandatory stop behavior.
  - path: codex/core/07-source-control-policy.md
    purpose: Defines source-control boundaries.
  - path: codex/core/08-secret-handling-policy.md
    purpose: Defines secret-handling requirements.
  - path: codex/core/09-prompt-injection-policy.md
    purpose: Defines handling of untrusted repository content.
  - path: codex/core/10-reporting-and-state-policy.md
    purpose: Defines truthful reporting and execution-state requirements.
  - path: codex/access/github-repository-policy.yaml
    purpose: Defines identity-role-operation access decisions.
  - path: codex/access/prohibited-repositories.yaml
    purpose: Defines permanent repository-role exclusions.
  - path: codex/engineering/database-evolution-policy.md
    purpose: Defines additive migration requirements.
  - path: codex/engineering/structured-command-policy.md
    purpose: Defines approved structured-command execution.
  - path: codex/engineering/runner-security-controls.md
    purpose: Defines untrusted runner security controls.
  - path: codex/engineering/testing-policy.md
    purpose: Defines test execution and evidence requirements.
  - path: codex/roadmap/phase-3a-npm-monorepos.md
    purpose: Defines Phase 3A scope and completion criteria.
  - path: codex/authorizations/current-phase-authorization.yaml
    purpose: Identifies whether Phase 3A execution is currently authorized.
defaults:
  default_runner_profile: isolated-typescript-runner
  default_network_profile: network-disabled
  default_timeout_seconds: 1200
  default_output_limit_bytes: 2097152
  default_retry_policy: no_retry
  unavailable_test_result: not_passed
  skipped_test_result: not_passed
  unexpected_error_result: failed
  cleanup_required: true
fixtures:
  - fixture_id: phase-3a-local-dcav2
    fixture_type: system_under_test
    description: >-
      The authorized local DCAv2 implementation repository under test. It is
      never an analysis target, qualification target, or test-fixture
      repository.
    source_identity: akshay-hudev/Rufa-Clean
    authorization_required: true
    cleanup_required: false
  - fixture_id: phase-3a-supported-npm-workspace
    fixture_type: synthetic_repository
    description: >-
      A synthetic bounded npm workspace with a supported declaration, lockfile,
      finite TypeScript packages, package graph, and available gates.
    source_identity: synthetic-phase-3a-supported-npm-workspace
    immutable_revision: fixture-version-1
    authorization_required: false
    tenant_scope: synthetic-phase-3a-tenant
    cleanup_required: true
  - fixture_id: phase-3a-workspace-variants
    fixture_type: synthetic_repository
    description: >-
      Synthetic repositories covering nested workspaces, overlapping roots,
      duplicate names, lockfile conflicts, pnpm and Yarn indicators, broken
      baselines, path-alias ambiguity, export and project-reference edge cases,
      and undeclared nested manifests.
    source_identity: synthetic-phase-3a-workspace-variants
    immutable_revision: fixture-version-1
    authorization_required: false
    tenant_scope: synthetic-phase-3a-tenant
    cleanup_required: true
  - fixture_id: phase-3a-hostile-content
    fixture_type: synthetic_repository
    description: >-
      Synthetic malicious manifests, documentation, lifecycle scripts, symbolic
      links, outputs, and secret canaries used to test containment.
    source_identity: synthetic-phase-3a-hostile-content
    immutable_revision: fixture-version-1
    authorization_required: false
    contains_synthetic_secrets: true
    tenant_scope: synthetic-phase-3a-tenant
    cleanup_required: true
  - fixture_id: phase-3a-database
    fixture_type: database
    description: >-
      A disposable PostgreSQL-compatible fixture containing the Phase 2 schema,
      multiple synthetic tenants, and room for additive Phase 3A workspace
      tables and audit history.
    source_identity: phase-3a-postgresql-fixture
    immutable_revision: fixture-version-1
    authorization_required: false
    tenant_scope: synthetic-phase-3a-tenant
    cleanup_required: true
  - fixture_id: phase-3a-external-representative
    fixture_type: external_repository
    description: >-
      A bounded representative sample of eligible akshay-hudev npm workspace
      repositories at immutable revisions, excluding Rufa-Clean before target
      metadata or content access. rufa-test-lib is optional smoke evidence only.
    source_identity: dynamically-selected-eligible-akshay-hudev-repositories
    authorization_required: true
    tenant_scope: authorized-phase-3a-tenant
    cleanup_required: true

test_groups:

  - group_id: phase-3a-authorization
    title: Authorization and repository-role boundaries
    purpose: >-
      Verify exact Phase 3A activation, permission separation, permanent
      Rufa-Clean exclusions, and the Phase 3B boundary.
    execution_order: 10
    stop_group_on_failure: true
    tests:
      - test_id: p3a-current-phase-authorization
        title: Validate current Phase 3A authorization
        objective: >-
          Require an active exact Phase 3A authorization bound to the required
          implementation branch, workspace and package scope, operations,
          manifest, credentials, tests, and stop conditions before any Phase 3A
          implementation command.
        category: governance
        requirement: required
        execution_mode: automated
        capability_ids: [repository.npm-workspace.qualify.v1]
        command_ids: [authorization.validate-phase-3a]
        fixture_ids:
          - phase-3a-local-dcav2
        expected_results:
          - result_id: exact-phase-3a-authorization
            description: >-
              Phase 3A runs only under a matching active human authorization.
            status: passed
            machine_assertion: unauthorized_phase_3a_execution_count == 0
        evidence_requirements:
          - evidence_type: authorization_record
            description: >-
              Schema-valid exact Phase 3A authorization and activation decision.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

      - test_id: p3a-operation-permission-separation
        title: Preserve operation permission separation
        objective: >-
          Prove discovery does not imply analysis, analysis does not imply
          remediation, package-scoped authorization does not authorize other
          packages, and no Phase 3A permission implies publication or Phase 3B.
        category: governance
        requirement: required
        execution_mode: automated
        capability_ids: [repository.npm-workspace.qualify.v1]
        command_ids: [authorization.verify-operation-separation]
        fixture_ids:
          - phase-3a-supported-npm-workspace
        expected_results:
          - result_id: operation-permissions-separated
            description: >-
              Every unauthorized successor operation is denied independently.
            status: passed
            machine_assertion: permission_inheritance_count == 0
        evidence_requirements:
          - evidence_type: policy_decision
            description: >-
              Allow and deny decisions for each operation boundary.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

      - test_id: p3a-rufa-clean-target-exclusion
        title: Enforce canonical Rufa-Clean target exclusions
        objective: >-
          Prove canonical identity blocks Rufa-Clean before qualification,
          metadata expansion, content acquisition, fixture use, finding
          generation, remediation, cross-repository participation, runtime,
          contract, scale, branch, commit, push, pull-request, and publication
          operations while authorized local implementation work remains valid.
        category: security
        requirement: required
        execution_mode: automated
        capability_ids: [repository.npm-workspace.qualify.v1]
        command_ids: [repository-access.verify-rufa-clean-exclusions]
        fixture_ids:
          - phase-3a-local-dcav2
        expected_results:
          - result_id: rufa-clean-denied-before-target-access
            description: >-
              All target and external-write operations are denied by exact
              identity.
            status: passed
            machine_assertion: rufa_clean_target_content_access_count == 0
        evidence_requirements:
          - evidence_type: policy_decision
            description: >-
              Secret-free identity, role, operation, authorization, and deny
              decisions.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

      - test_id: p3a-phase-3b-remains-unauthorized
        title: Preserve the Phase 3B boundary
        objective: >-
          Verify completion or failure of Phase 3A never starts Phase 3B without
          a separate exact human authorization.
        category: governance
        requirement: required
        execution_mode: automated
        capability_ids: [repository.npm-workspace.qualify.v1]
        command_ids: [authorization.verify-phase-3b-inactive]
        fixture_ids:
          - phase-3a-local-dcav2
        expected_results:
          - result_id: phase-3b-inactive
            description: >-
              No automatic next-phase transition occurs.
            status: passed
            machine_assertion: implicit_phase_3b_transition_count == 0
        evidence_requirements:
          - evidence_type: authorization_record
            description: >-
              Phase handoff record showing Phase 3B inactive.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

  - group_id: phase-3a-workspace-discovery
    title: npm workspace discovery
    purpose: >-
      Validate deterministic npm workspace declaration discovery and
      explicit unsupported workspace shapes.
    execution_order: 20
    stop_group_on_failure: true
    tests:
      - test_id: p3a-supported-workspace-declaration
        title: Discover supported npm workspace declarations
        objective: >-
          Discover supported npm workspace declaration forms with provenance
          including location, patterns, package set, and digest for the bounded
          single-root npm workspace profile.
        category: functional
        requirement: required
        execution_mode: automated
        capability_ids: [workspace.npm.discover.v1, repository.npm-workspace.qualify.v1]
        command_ids: [workspace.test-supported-declaration]
        fixture_ids:
          - phase-3a-supported-npm-workspace
        expected_results:
          - result_id: supported-workspace-discovered
            description: >-
              Supported workspace declaration is deterministic and digest-bound.
            status: passed
            machine_assertion: workspace_declaration_digest_missing_count == 0
        evidence_requirements:
          - evidence_type: structured_result
            description: >-
              Workspace declaration identity, patterns, and digest.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

      - test_id: p3a-workspace-pattern-safety
        title: Reject unsafe workspace patterns
        objective: >-
          Reject absolute paths, parent-directory escapes, symbolic-link
          escapes, dependency directories, and unbounded globs during workspace
          discovery.
        category: security
        requirement: required
        execution_mode: automated
        capability_ids: [workspace.npm.discover.v1]
        command_ids: [workspace.test-pattern-safety]
        fixture_ids:
          - phase-3a-workspace-variants
          - phase-3a-hostile-content
        expected_results:
          - result_id: unsafe-patterns-rejected
            description: >-
              Unsafe patterns never enlarge the authorized package set.
            status: passed
            machine_assertion: unsafe_workspace_pattern_accept_count == 0
        evidence_requirements:
          - evidence_type: structured_result
            description: >-
              Rejected pattern cases and confinement decisions.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

      - test_id: p3a-unsupported-workspace-shapes
        title: Detect unsupported workspace shapes
        objective: >-
          Detect nested independent workspaces, overlapping roots, conflicting
          lockfiles, pnpm indicators, Yarn indicators, and ambiguous
          declarations as configuration_required or unsupported without silent
          flattening or readiness claims.
        category: functional
        requirement: required
        execution_mode: automated
        capability_ids: [workspace.npm.discover.v1, repository.npm-workspace.qualify.v1]
        command_ids: [workspace.test-unsupported-shapes]
        fixture_ids:
          - phase-3a-workspace-variants
        expected_results:
          - result_id: unsupported-shapes-explicit
            description: >-
              Unsupported shapes never report ready.
            status: passed
            machine_assertion: unsupported_workspace_reported_ready_count == 0
        evidence_requirements:
          - evidence_type: structured_result
            description: >-
              Explicit unsupported or configuration-required outcomes for each
              shape.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

  - group_id: phase-3a-package-identity-graph
    title: Package identity and dependency graph
    purpose: >-
      Validate canonical package identity, duplicate-name safety,
      deterministic package graphs, and lockfile consistency.
    execution_order: 30
    stop_group_on_failure: true
    tests:
      - test_id: p3a-canonical-package-identity
        title: Bind canonical package identity
        objective: >-
          Bind package identity to repository, immutable commit, package root,
          manifest digest, and package name so same-name packages in different
          roots remain distinct.
        category: functional
        requirement: required
        execution_mode: automated
        capability_ids: [workspace.npm.package-inventory.v1]
        command_ids: [workspace.test-package-identity]
        fixture_ids:
          - phase-3a-supported-npm-workspace
          - phase-3a-workspace-variants
        expected_results:
          - result_id: package-identity-deterministic
            description: >-
              Package identities are unambiguous and stable across reruns.
            status: passed
            machine_assertion: ambiguous_package_identity_count == 0
        evidence_requirements:
          - evidence_type: structured_result
            description: >-
              Canonical package identity records and digests.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

      - test_id: p3a-duplicate-package-names
        title: Fail safely on duplicate package names
        objective: >-
          Detect duplicate package names and fail safely without collapsing
          distinct roots into one graph node.
        category: failure
        requirement: required
        execution_mode: automated
        capability_ids: [workspace.npm.package-inventory.v1, workspace.npm.package-graph.v1]
        command_ids: [workspace.test-duplicate-package-names]
        fixture_ids:
          - phase-3a-workspace-variants
        expected_results:
          - result_id: duplicate-names-rejected
            description: >-
              Duplicate names never silently merge package nodes.
            status: passed
            machine_assertion: duplicate_package_name_collapse_count == 0
        evidence_requirements:
          - evidence_type: structured_result
            description: >-
              Duplicate-name rejection and graph isolation evidence.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

      - test_id: p3a-package-graph-construction
        title: Construct deterministic package graphs
        objective: >-
          Construct deterministic package graph nodes and edges for runtime,
          development, peer, and optional dependencies including root edges,
          with order-independent digests and explicit unresolved edges.
        category: functional
        requirement: required
        execution_mode: automated
        capability_ids: [workspace.npm.package-graph.v1]
        command_ids: [workspace.test-package-graph]
        fixture_ids:
          - phase-3a-supported-npm-workspace
          - phase-3a-workspace-variants
        expected_results:
          - result_id: package-graph-deterministic
            description: >-
              Graph digests are stable under file-order variation.
            status: passed
            machine_assertion: package_graph_nondeterminism_count == 0
        evidence_requirements:
          - evidence_type: structured_result
            description: >-
              Package graph nodes, edges, unresolved edges, and digest.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

      - test_id: p3a-lockfile-manifest-consistency
        title: Evaluate lockfile and manifest consistency
        objective: >-
          Detect missing packages, version or root mismatches, stale lockfiles,
          and lockfile-manifest disagreement without automatic repair.
        category: functional
        requirement: required
        execution_mode: automated
        capability_ids: [workspace.npm.package-graph.v1, repository.npm-workspace.qualify.v1]
        command_ids: [workspace.test-lockfile-consistency]
        fixture_ids:
          - phase-3a-workspace-variants
        expected_results:
          - result_id: lockfile-consistency-explicit
            description: >-
              Inconsistencies are explicit and never auto-repaired.
            status: passed
            machine_assertion: lockfile_auto_repair_count == 0 && unresolved_required_edge_hidden_count == 0
        evidence_requirements:
          - evidence_type: structured_result
            description: >-
              Lockfile consistency findings and status.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

  - group_id: phase-3a-package-roots
    title: Package-level source, test, generated, and excluded roots
    purpose: >-
      Validate per-package root discovery and handling of undeclared nested
      manifests.
    execution_order: 40
    stop_group_on_failure: true
    tests:
      - test_id: p3a-package-source-test-generated-roots
        title: Discover package-aware roots
        objective: >-
          Discover source, test, generated, and excluded roots per package with
          package binding and reject ambiguous shared ownership across packages.
        category: functional
        requirement: required
        execution_mode: automated
        capability_ids: [workspace.npm.package-roots.v1]
        command_ids: [workspace.test-package-roots]
        fixture_ids:
          - phase-3a-supported-npm-workspace
          - phase-3a-workspace-variants
        expected_results:
          - result_id: package-roots-bound
            description: >-
              Every discovered root is bound to exactly one package identity.
            status: passed
            machine_assertion: ambiguous_shared_root_ownership_count == 0
        evidence_requirements:
          - evidence_type: structured_result
            description: >-
              Per-package root inventories and bindings.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

      - test_id: p3a-undeclared-nested-manifests
        title: Handle undeclared nested manifests
        objective: >-
          Treat nested fixture, example, and vendor manifests as non-members
          unless declared; if they may contain relevant evidence, coverage
          remains incomplete rather than silently ignored.
        category: functional
        requirement: required
        execution_mode: automated
        capability_ids: [workspace.npm.package-inventory.v1, coverage.typescript.npm-workspace.v1]
        command_ids: [workspace.test-undeclared-manifests]
        fixture_ids:
          - phase-3a-workspace-variants
        expected_results:
          - result_id: undeclared-manifests-explicit
            description: >-
              Undeclared manifests never become silent workspace members.
            status: passed
            machine_assertion: undeclared_manifest_auto_member_count == 0
        evidence_requirements:
          - evidence_type: structured_result
            description: >-
              Membership decisions and coverage impact records.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

  - group_id: phase-3a-toolchain-commands
    title: Workspace command and toolchain resolution
    purpose: >-
      Validate package-aware structured commands, toolchain binding, and
      install lifecycle boundaries.
    execution_order: 50
    stop_group_on_failure: true
    tests:
      - test_id: p3a-workspace-command-routing
        title: Route workspace and package commands
        objective: >-
          Map root, package, and aggregate typecheck, build, and test commands
          to approved structured commands with working directory, npm mode,
          limits, and expected artifacts.
        category: functional
        requirement: required
        execution_mode: automated
        capability_ids: [verification.npm-workspace.package-gates.v1, verification.npm-workspace.aggregate-gates.v1]
        command_ids: [workspace.test-command-routing]
        fixture_ids:
          - phase-3a-supported-npm-workspace
        expected_results:
          - result_id: commands-structured-and-scoped
            description: >-
              Discovered repository scripts never execute directly.
            status: passed
            machine_assertion: direct_discovered_command_execution_count == 0
        evidence_requirements:
          - evidence_type: command_record
            description: >-
              Structured command mappings and scopes.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

      - test_id: p3a-package-command-identity-binding
        title: Bind commands to package identity
        objective: >-
          Bind commands to canonical package identity and reject duplicate
          names, wrong roots, and unauthorized package scopes.
        category: security
        requirement: required
        execution_mode: automated
        capability_ids: [workspace.npm.package-inventory.v1, verification.npm-workspace.package-gates.v1]
        command_ids: [workspace.test-command-identity-binding]
        fixture_ids:
          - phase-3a-supported-npm-workspace
          - phase-3a-workspace-variants
        expected_results:
          - result_id: command-identity-bound
            description: >-
              Commands cannot target an unauthorized or ambiguous package.
            status: passed
            machine_assertion: unauthorized_package_command_accept_count == 0
        evidence_requirements:
          - evidence_type: policy_decision
            description: >-
              Command-to-package binding decisions.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

      - test_id: p3a-root-install-and-lifecycle
        title: Install at workspace root without host fallback
        objective: >-
          Perform deterministic root dependency installation with lifecycle
          scripts attributable and disabled or isolated; never fall back to
          host-global Node, npm, or TypeScript tools.
        category: security
        requirement: required
        execution_mode: automated
        capability_ids: [repository.npm-workspace.qualify.v1, verification.npm-workspace.aggregate-gates.v1]
        command_ids: [workspace.test-root-install-lifecycle]
        fixture_ids:
          - phase-3a-supported-npm-workspace
          - phase-3a-hostile-content
        expected_results:
          - result_id: root-install-isolated
            description: >-
              Host-global toolchain fallback never occurs.
            status: passed
            machine_assertion: host_global_toolchain_fallback_count == 0
        evidence_requirements:
          - evidence_type: command_record
            description: >-
              Install command, network profile, and toolchain identities.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false

  - group_id: phase-3a-coverage
    title: Partial and complete workspace coverage
    purpose: >-
      Validate package-level and aggregate coverage semantics including
      partial failure and unsupported exclusions.
    execution_order: 60
    stop_group_on_failure: true
    tests:
      - test_id: p3a-workspace-coverage-complete
        title: Require complete workspace coverage
        objective: >-
          Aggregate coverage is complete only when every required package has
          complete supported coverage and the aggregate digest is retained.
        category: functional
        requirement: required
        execution_mode: automated
        capability_ids: [coverage.typescript.npm-workspace.v1]
        command_ids: [workspace.test-coverage-complete]
        fixture_ids:
          - phase-3a-supported-npm-workspace
        expected_results:
          - result_id: workspace-coverage-complete
            description: >-
              Complete coverage requires all required packages complete.
            status: passed
            machine_assertion: complete_coverage_with_incomplete_required_package_count == 0
        evidence_requirements:
          - evidence_type: coverage_record
            description: >-
