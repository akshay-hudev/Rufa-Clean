completion_policy:
  required_tests: all_active_required_tests_must_pass
  conditional_tests: all_activated_conditional_tests_must_pass
  informational_tests: do_not_block
  unavailable_tests: block_phase
  skipped_tests: block_phase
  failed_cleanup: block_phase
  unknown_external_state: block_retry_and_completion
  security_failures: block_phase
  phase_completion_requires_current_authorization: true
  allow_completion_with_known_failures: false
  required_capability_statuses:
    - functional
  notes: >-
    Phase 3A is complete only when every active required test and every
    activated conditional test passes. Detection of an unsupported workspace
    shape is valid behavior, but no unsupported shape may be reported ready or
    functional. Detection-only completion requires explicit authorization and
    must not be reported as workspace remediation support. Remediation and
    publication remain separately authorized.
reporting:
  record_each_test: true
  record_unavailable_tests: true
  record_skipped_tests: true
  record_cleanup: true
  record_external_operations: true
  record_test_inputs: true
  record_test_environment: true
  redact_secrets: true
  prohibit_false_pass: true
  required_report_schema: codex/schemas/phase-report.schema.json
  required_audit_event_types:
    - phase-test-started
    - phase-test-completed
    - phase-test-failed
    - phase-test-blocked
    - phase-test-unavailable
    - phase-test-skipped
    - workspace-qualification-requested
    - workspace-detected
    - package-discovered
    - duplicate-package-rejected
    - package-graph-created
    - graph-edge-unresolved
    - package-qualification-completed
    - workspace-coverage-completed
    - package-gate-completed
    - aggregate-gate-completed
    - cross-workspace-reference-recorded
    - finding-classified
    - remediation-reproduced
    - package-scoped-transformation-completed
    - unexpected-file-rejected
    - patch-created
    - repository-access-denied
    - repository-role-exclusion-enforced
    - phase-cleanup-completed
    - phase-cleanup-failed
