completion_policy:
  required_tests: all_active_required_tests_must_pass
  conditional_tests: all_activated_conditional_tests_must_pass
  informational_tests: do_not_block
  unavailable_tests: block_phase
  skipped_tests: block_phase
  failed_cleanup: block_phase
  unknown_external_state: block_retry_and_completion
  security_failures: block_phase
  phase_completion_requires_current_authorization: true
  allow_completion_with_known_failures: false
  notes: >-
    Phase 0 may report the current implementation as partial or blocked, but the Phase 0 reconciliation process itself is complete only when every active required test and activated conditional test passes. A discovered product defect may remain open when it is reproduced, bounded, reported, and does not invalidate a required Phase 0 governance or security test.
reporting:
  record_each_test: true
  record_unavailable_tests: true
  record_skipped_tests: true
  record_cleanup: true
  record_external_operations: true
  record_test_inputs: true
  record_test_environment: true
  redact_secrets: true
  prohibit_false_pass: true
  required_report_schema: codex/schemas/phase-report.schema.json
  required_audit_event_types:
    - phase-test-started
    - phase-test-completed
    - phase-test-failed
