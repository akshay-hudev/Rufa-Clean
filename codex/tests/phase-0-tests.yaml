$schema: ./phase-test-manifest.schema.json
schema_version: "1.0.0"
manifest_id: phase-0-tests
phase_id: phase-0-reconciliation
title: Phase 0 Reconciliation Test Manifest
purpose: >-
  Defines the required governance, repository-state, baseline, security, runner, persistence, reporting, and handoff tests for Phase 0. This manifest records required tests but does not authorize implementation, repository access, credential use, external operations, remediation, publication, or destructive actions.
document_status: active
implementation_authorized_by_manifest: false
capability_ids:
  - governance.reconciliation.phase-0.v1
  - governance.authorization.default-deny.v1
  - governance.repository-access-policy.v1
  - repository.current-system-inventory.v1
  - repository.baseline-validation.v1
  - runner.typescript-tool-resolution.reproduce.v1
  - security.prompt-injection-governance.v1
  - security.secret-handling-governance.v1
  - reporting.phase-0-completion.v1
references:
  - path: AGENTS.md
    purpose: Defines repository-level operating instructions.
  - path: codex/core/01-instruction-precedence.md
    purpose: Defines instruction precedence and conflict handling.
  - path: codex/core/03-safety-invariants.md
    purpose: Defines permanent safety invariants.
  - path: codex/core/05-phase-authorization-protocol.md
    purpose: Defines phase authorization requirements.
  - path: codex/core/08-secret-handling-policy.md
    purpose: Defines secret-handling requirements.
  - path: codex/core/09-prompt-injection-policy.md
    purpose: Defines treatment of untrusted instructions.
  - path: codex/core/10-reporting-and-state-policy.md
    purpose: Defines truthful reporting and state requirements.
  - path: codex/access/github-repository-policy.yaml
    purpose: Defines operation-specific repository-access policy.
  - path: codex/access/prohibited-repositories.yaml
    purpose: Defines repositories that must never receive content access.
  - path: codex/architecture/current-system-contract.md
    purpose: Defines the current implementation boundary to reconcile.
  - path: codex/engineering/runner-security-controls.md
    purpose: Defines required runner security controls.
  - path: codex/engineering/testing-policy.md
    purpose: Defines test execution and reporting policy.
  - path: codex/roadmap/phase-0-reconciliation.md
    purpose: Defines Phase 0 scope and completion criteria.
  - path: codex/authorizations/current-phase-authorization.yaml
    purpose: Identifies whether Phase 0 execution is currently authorized.
defaults:
  default_runner_profile: governance-readonly-runner
  default_network_profile: network-disabled
  default_timeout_seconds: 600
  default_output_limit_bytes: 1048576
  default_retry_policy: no_retry
  unavailable_test_result: not_passed
  skipped_test_result: not_passed
  unexpected_error_result: failed
  cleanup_required: true
fixtures:
  - fixture_id: phase-0-local-repository
    fixture_type: local_repository
    description: >-
      The local DCAv2 working tree at the exact revision and worktree state recorded for the authorized Phase 0 execution.
    source_identity: local-dcav2-working-tree
    authorization_required: true
    cleanup_required: false
  - fixture_id: phase-0-governance-tree
    fixture_type: generated_dataset
    description: >-
      The expected governance file inventory and reference relationships for the DCAv2 operating-system structure.
    source_identity: codex-governance-file-inventory
    authorization_required: false
    cleanup_required: false
  - fixture_id: phase-0-hostile-content
    fixture_type: synthetic_repository
    description: >-
      Synthetic source, documentation, command output, and metadata containing prompt-injection attempts, false authorization claims, and secret canaries.
    source_identity: synthetic-phase-0-hostile-content
    authorization_required: false
    contains_synthetic_secrets: true
    tenant_scope: synthetic-phase-0-tenant
    cleanup_required: true
  - fixture_id: phase-0-database-snapshot
    fixture_type: database
    description: >-
      An authorized local or isolated database snapshot used only to inventory current migrations, audit behavior, and tenant boundaries.
    source_identity: authorized-phase-0-database-snapshot
    authorization_required: true
    contains_synthetic_secrets: false
    tenant_scope: phase-0-test-tenant
    cleanup_required: true
test_groups:
  - group_id: phase-0-governance-integrity
    title: Governance integrity
    purpose: >-
      Verify that the permanent governance documents are present, parseable, internally consistent, and incapable of authorizing implementation by themselves.
    execution_order: 10
    stop_group_on_failure: true
    tests:
      - test_id: p0-required-governance-files
        title: Verify required governance files
        objective: >-
          Confirm that every governance file required before Phase 0 execution exists at its canonical repository-relative path.
        category: governance
        requirement: required
        execution_mode: automated
        capability_ids:
          - governance.reconciliation.phase-0.v1
        requirement_references:
          - path: codex/README.md
            purpose: Defines the canonical governance structure.
          - path: codex/roadmap/phase-0-reconciliation.md
            purpose: Defines the Phase 0 prerequisites.
        required_permissions:
          - local-repository-read
        command_ids:
          - governance.verify-required-files
        runner_profile: governance-readonly-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-0-local-repository
          - phase-0-governance-tree
        expected_results:
          - result_id: all-required-files-present
            description: >-
              Every required governance file exists at the expected path and no required path is represented only by an unresolved link.
            status: passed
            machine_assertion: missing_required_file_count == 0
        evidence_requirements:
          - evidence_type: structured_result
            description: Canonical inventory of required, present, and missing files.
            schema_or_format: governance-file-inventory-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false
        tags:
          - governance
          - file-inventory
      - test_id: p0-structured-governance-parse
        title: Parse structured governance files
        objective: >-
          Confirm that every required YAML and JSON governance file parses without silently ignoring duplicate keys or malformed structure.
        category: governance
        requirement: required
        execution_mode: automated
        capability_ids:
          - governance.reconciliation.phase-0.v1
        required_permissions:
          - local-repository-read
          - local-command-execution
        command_ids:
          - governance.parse-yaml-files
          - governance.parse-json-files
        runner_profile: governance-readonly-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-0-local-repository
        expected_results:
          - result_id: structured-files-parse
            description: >-
              All required YAML and JSON files parse successfully with duplicate-key rejection enabled where the parser supports it.
            status: passed
            machine_assertion: parse_failure_count == 0
        evidence_requirements:
          - evidence_type: test_report
            description: Per-file parse status and parser identity.
            schema_or_format: structured-file-parse-report-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false
        tags:
          - governance
          - yaml
          - json
      - test_id: p0-instruction-precedence-consistency
        title: Validate instruction-precedence consistency
        objective: >-
          Confirm that lower-precedence documents do not claim authority to override permanent safety invariants, active human authorization, or prohibited-repository policy.
        category: governance
        requirement: required
        execution_mode: hybrid
        capability_ids:
          - governance.reconciliation.phase-0.v1
        requirement_references:
          - path: codex/core/01-instruction-precedence.md
          - path: codex/core/03-safety-invariants.md
          - path: codex/core/05-phase-authorization-protocol.md
        required_permissions:
          - local-repository-read
        command_ids:
          - governance.check-precedence-claims
        runner_profile: governance-readonly-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-0-local-repository
        procedure:
          - Review every reported authority conflict.
          - Confirm that permanent safety invariants cannot be weakened by roadmap or report files.
          - Confirm that only current explicit human authorization can activate execution.
        expected_results:
          - result_id: no-authority-conflicts
            description: >-
              No lower-precedence file grants itself implementation, remediation, publication, destructive-operation, or policy override authority.
            status: passed
            human_verification: Every reported authority claim is consistent with the precedence policy.
        evidence_requirements:
          - evidence_type: structured_result
            description: Detected authority claims and their precedence classification.
            schema_or_format: instruction-precedence-analysis-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
          - evidence_type: manual_attestation
            description: Human review of all detected precedence conflicts.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: manual_only
        cleanup_required: false
        tags:
          - governance
          - precedence
      - test_id: p0-roadmap-does-not-authorize
        title: Verify roadmap files do not authorize execution
        objective: >-
          Confirm that every roadmap phase explicitly states that the roadmap does not authorize implementation or external operations.
        category: governance
        requirement: required
        execution_mode: automated
        capability_ids:
          - governance.authorization.default-deny.v1
        required_permissions:
          - local-repository-read
        command_ids:
          - governance.verify-roadmap-non-authorization
        runner_profile: governance-readonly-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-0-local-repository
        expected_results:
          - result_id: roadmap-authority-denied
            description: >-
              Every roadmap file has an explicit non-authorization statement and an inactive default phase status.
            status: passed
            machine_assertion: unauthorized_roadmap_authority_claim_count == 0
        evidence_requirements:
          - evidence_type: structured_result
            description: Per-roadmap-file authorization and default-status checks.
            schema_or_format: roadmap-authority-check-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false
        tags:
          - governance
          - roadmap
          - default-deny
  - group_id: phase-0-authorization-and-access
    title: Authorization and repository access
    purpose: >-
      Verify default-deny execution state, operation-specific repository policy, and prohibited-repository enforcement before any content access.
    execution_order: 20
    stop_group_on_failure: true
    tests:
      - test_id: p0-current-authorization-default-deny
        title: Validate inactive current authorization
        objective: >-
          Confirm that the current authorization record grants no implementation, remediation, publication, credential, external-operation, or destructive-operation permission unless an explicit Phase 0 authorization has replaced the inactive record.
        category: governance
        requirement: required
        execution_mode: automated
        capability_ids:
          - governance.authorization.default-deny.v1
        requirement_references:
          - path: codex/authorizations/current-phase-authorization.yaml
          - path: codex/core/05-phase-authorization-protocol.md
        required_permissions:
          - local-repository-read
        command_ids:
          - authorization.validate-current-record
        runner_profile: governance-readonly-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-0-local-repository
        expected_results:
          - result_id: authorization-state-consistent
            description: >-
              The current authorization is either explicitly inactive with all operation permissions denied or is a valid current Phase 0 authorization satisfying the authorization protocol.
            status: passed
            machine_assertion: authorization_record_is_internally_consistent == true
        evidence_requirements:
          - evidence_type: authorization_record
            description: Validated current-phase authorization record with no secret values.
            schema_or_format: phase-authorization-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
          - evidence_type: structured_result
            description: Authorization validation result and denied operation set.
            schema_or_format: authorization-validation-result-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false
        tags:
          - authorization
          - default-deny
      - test_id: p0-repository-policy-operation-specific
        title: Validate operation-specific repository policy
        objective: >-
          Confirm that repository access is evaluated independently for metadata, source read, analysis, modification, publication, and destructive operations.
        category: security
        requirement: required
        execution_mode: automated
        capability_ids:
          - governance.repository-access-policy.v1
        requirement_references:
          - path: codex/access/github-repository-policy.yaml
          - path: codex/access/external-operation-policy.md
        required_permissions:
          - local-repository-read
        command_ids:
          - access-policy.validate-operation-matrix
        runner_profile: governance-readonly-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-0-local-repository
        expected_results:
          - result_id: operation-policy-separated
            description: >-
              Read authority cannot imply modification, publication, merge, settings, deletion, or destructive authority.
            status: passed
            machine_assertion: implicit_permission_escalation_count == 0
        evidence_requirements:
          - evidence_type: policy_decision
            description: Operation matrix showing allowed, denied, and authorization-required operations.
            schema_or_format: repository-operation-policy-matrix-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false
        tags:
          - access-policy
          - least-privilege
      - test_id: p0-repository-role-exclusion-matrix
        title: Validate implementation access and target-role exclusions
        objective: >-
          Confirm that akshay-hudev/Rufa-Clean is recognized as the DCAv2
          implementation repository while every dead-code target role remains
          denied before the corresponding target operation begins.
        category: security
        requirement: required
        execution_mode: automated
        capability_ids:
          - governance.repository-access-policy.v1
        requirement_references:
          - path: codex/access/prohibited-repositories.yaml
          - path: codex/core/03-safety-invariants.md
        required_permissions:
          - local-repository-read
        command_ids:
          - access-policy.test-repository-role-exclusions
        runner_profile: governance-readonly-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-0-governance-tree
        expected_results:
          - result_id: implementation-repository-recognized
            description: >-
              The local worktree is recognized as the DCAv2 implementation
              repository and identity alone does not trigger a target denial.
            status: passed
            machine_assertion: implementation_repository_identity_match == true
          - result_id: implementation-access-requires-authorization
            description: >-
              Local implementation inspection, modification, build, and test
              decisions require explicit matching phase authorization.
            status: passed
            machine_assertion: unauthorized_implementation_allow_count == 0
          - result_id: read-does-not-imply-modification
            description: Read permission does not grant modification.
            status: passed
            machine_assertion: read_to_modify_escalation_count == 0
          - result_id: implementation-modification-does-not-imply-analysis
            description: Implementation modification does not grant analysis-target permission.
            status: passed
            machine_assertion: implementation_to_analysis_escalation_count == 0
          - result_id: analysis-target-qualification-denied
            description: Qualification as a dead-code target is denied before analysis.
            status: passed
            machine_assertion: excluded_target_qualification_start_count == 0
          - result_id: finding-generation-denied
            description: Dead-code finding generation is denied.
            status: passed
            machine_assertion: excluded_target_finding_count == 0
          - result_id: fixture-use-denied
            description: Use as a test fixture is denied.
            status: passed
            machine_assertion: excluded_target_fixture_registration_count == 0
          - result_id: remediation-target-denied
            description: Dead-code remediation is denied.
            status: passed
            machine_assertion: excluded_target_remediation_start_count == 0
          - result_id: cross-repository-target-denied
            description: Inclusion in cross-repository dead-code analysis is denied.
            status: passed
            machine_assertion: excluded_target_graph_inclusion_count == 0
          - result_id: runtime-evidence-target-denied
            description: Runtime dead-code evidence processing and classification are denied.
            status: passed
            machine_assertion: excluded_target_runtime_evidence_count == 0
          - result_id: automated-remediation-publication-denied
            description: Automated dead-code remediation publication is denied.
            status: passed
            machine_assertion: excluded_target_publication_count == 0
          - result_id: other-analysis-permission-does-not-imply-publication
            description: Analysis permission for another repository does not grant publication.
            status: passed
            machine_assertion: analysis_to_publication_escalation_count == 0
        evidence_requirements:
          - evidence_type: policy_decision
            description: Role-aware access decisions for implementation and target operations.
            schema_or_format: repository-role-operation-decision-v2
            required_for_pass: true
            retention_required: true
            secret_free: true
          - evidence_type: audit_event
            description: Secret-free target-role denial events.
            schema_or_format: audit-event-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false
        tags:
          - repository-role-exclusion
          - preflight
          - security
      - test_id: p0-external-operations-default-deny
        title: Validate default denial of external operations
        objective: >-
          Confirm that external reads, writes, branch creation, pull-request creation, publication, deployment, infrastructure changes, and destructive operations require explicit current authorization.
        category: security
        requirement: required
        execution_mode: automated
        capability_ids:
          - governance.authorization.default-deny.v1
        requirement_references:
          - path: codex/access/external-operation-policy.md
          - path: codex/core/05-phase-authorization-protocol.md
        required_permissions:
          - local-repository-read
        command_ids:
          - external-operations.validate-default-deny
        runner_profile: governance-readonly-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-0-governance-tree
        expected_results:
          - result_id: external-operations-denied-without-authorization
            description: >-
              Every tested external operation is denied when no matching current authorization is supplied.
            status: passed
            machine_assertion: unauthorized_external_operation_allow_count == 0
        evidence_requirements:
          - evidence_type: policy_decision
            description: Decision record for every tested external operation type.
            schema_or_format: external-operation-policy-test-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false
        tags:
          - external-operations
          - default-deny
  - group_id: phase-0-current-system-reconciliation
    title: Current-system reconciliation
    purpose: >-
      Establish an evidence-backed inventory of the existing implementation, preserve functioning behavior, and record the actual baseline without rewriting the system.
    execution_order: 30
    stop_group_on_failure: false
    tests:
      - test_id: p0-current-system-inventory
        title: Inventory the current implementation
        objective: >-
          Record the existing repository structure, application components, commands, tests, migrations, analyzers, runner paths, publisher paths, and known unfinished capabilities.
        category: functional
        requirement: required
        execution_mode: hybrid
        capability_ids:
          - repository.current-system-inventory.v1
        requirement_references:
          - path: codex/architecture/current-system-contract.md
          - path: codex/roadmap/phase-0-reconciliation.md
        required_permissions:
          - local-repository-read
          - local-command-execution
        command_ids:
          - repository.inventory-current-system
        runner_profile: governance-readonly-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-0-local-repository
        procedure:
          - Compare the discovered implementation with the current-system contract.
          - Mark every claimed capability as implemented, partial, absent, stale, or unknown.
          - Record evidence paths without copying secret values.
        expected_results:
          - result_id: current-system-inventory-complete
            description: >-
              Every material current subsystem has an evidence-backed status and no planned roadmap capability is reported as already implemented without evidence.
            status: passed
            human_verification: The inventory distinguishes implemented behavior from planned behavior.
        evidence_requirements:
          - evidence_type: structured_result
            description: Current subsystem and capability inventory.
            schema_or_format: current-system-inventory-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
          - evidence_type: manual_attestation
            description: Human-reviewed reconciliation of inventory claims.
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: manual_only
        cleanup_required: false
        tags:
          - current-system
          - inventory
          - reconciliation
      - test_id: p0-existing-codebase-preservation
        title: Verify the existing codebase is preserved
        objective: >-
          Confirm that Phase 0 reconciliation does not replace functioning implementation wholesale or delete existing behavior without separately authorized evidence-backed changes.
        category: regression
        requirement: required
        execution_mode: automated
        capability_ids:
          - repository.baseline-validation.v1
        required_permissions:
          - local-repository-read
          - local-command-execution
        command_ids:
          - repository.compare-phase-0-change-scope
        runner_profile: governance-readonly-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-0-local-repository
        expected_results:
          - result_id: no-unauthorized-rewrite
            description: >-
              Phase 0 changes are limited to authorized reconciliation, governance, tests, diagnostics, or narrowly approved corrections.
            status: passed
            machine_assertion: unauthorized_rewrite_or_deletion_count == 0
        evidence_requirements:
          - evidence_type: changed_file_record
            description: Complete changed-file inventory with authorization classification.
            schema_or_format: changed-file-record-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false
        tags:
          - regression
          - preserve-existing-system
      - test_id: p0-existing-test-baseline
        title: Record the existing test baseline
        objective: >-
          Execute every authorized existing baseline test command and record passed, failed, skipped, and unavailable tests without converting any unavailable or skipped test into a pass.
        category: regression
        requirement: required
        execution_mode: automated
        capability_ids:
          - repository.baseline-validation.v1
        required_permissions:
          - local-repository-read
          - local-command-execution
        command_ids:
          - tests.run-authorized-existing-baseline
        runner_profile: isolated-project-test-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-0-local-repository
        expected_results:
          - result_id: baseline-results-truthful
            description: >-
              Every discovered authorized baseline test has an explicit result and no skipped, unavailable, timed-out, or failed test is reported as passed.
            status: passed
            machine_assertion: false_pass_count == 0
        evidence_requirements:
          - evidence_type: test_report
            description: Per-command test results, durations, failures, skips, and unavailable tools.
            schema_or_format: baseline-test-report-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
          - evidence_type: command_record
            description: Structured records for every executed baseline command.
            schema_or_format: structured-command-result-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: true
        cleanup_evidence:
          - evidence_type: cleanup_record
            description: Test processes, temporary files, and isolated workspaces were cleaned.
            schema_or_format: cleanup-record-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        tags:
          - baseline
          - regression
          - truthful-reporting
      - test_id: p0-working-tree-preservation
        title: Preserve pre-existing local work
        objective: >-
          Confirm that Phase 0 execution does not overwrite, reset, clean, stash, revert, or delete pre-existing local user changes.
        category: security
        requirement: required
        execution_mode: automated
        capability_ids:
          - repository.baseline-validation.v1
        requirement_references:
          - path: codex/core/07-source-control-policy.md
        required_permissions:
          - local-repository-read
        command_ids:
          - repository.verify-preexisting-work-preserved
        runner_profile: governance-readonly-runner
        network_profile: network-disabled
        fixture_ids:
          - phase-0-local-repository
        expected_results:
          - result_id: preexisting-work-preserved
            description: >-
              The before-and-after repository state proves that pre-existing local work was not destroyed or silently incorporated.
            status: passed
            machine_assertion: preexisting_user_change_loss_count == 0
        evidence_requirements:
          - evidence_type: structured_result
            description: Redacted before-and-after repository-status comparison.
            schema_or_format: worktree-preservation-report-v1
            required_for_pass: true
            retention_required: true
            secret_free: true
        failure_behavior: block_phase
        retry_policy: no_retry
        cleanup_required: false
        tags:
          - source-control
          - local-work
  - group_id: phase-0-runner-reconciliation
    title: Runner and tool-resolution reconciliation
    purpose: >-
      Reproduce and classify the known TypeScript compiler-resolution failure without treating unavailable tooling as a passing remediation gate.
    execution_order: 40
    stop_group_on_failure: false
    tests:
      - test_id: p0-typescript-compiler-resolution-reproduction
        title: Reproduce the isolated TypeScript compiler-resolution defect
        objective: >-
          Determine whether the isolated runner can resolve the repository's declared TypeScript compiler during the supported remediation verification path.
        category: failure
        requirement: conditional
        execution_mode: automated
        activation:
          default_active: false
          any_of:
            - The current implementation contains the TypeScript remediation verification path.
