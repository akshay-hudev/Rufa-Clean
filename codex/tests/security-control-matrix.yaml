      - Preserve retry and cleanup state.
    evidence_requirements:
      - lease-record
      - worker-identity
      - late-result-rejection
      - credential-revocation-record
    validation_tests: []
    future_validation_required: true
    failure_behavior: security_stop
  - control_id: control-plane-budget-backpressure
    title: Enforce resource, cost, concurrency, and backpressure limits
    domain: control-plane
    objective: >-
      Prevent campaigns and tenants from exhausting shared compute, storage, provider allowance, database capacity, or authorized cost.
    severity: high
    applies_to:
      - phase-9-campaigns-and-control-plane
      - phase-10-scale-validation
    policy_status: defined
    implementation_status: not_assessed
    validation_status: not_run
    requirement_references:
      - codex/roadmap/phase-9-campaigns-and-control-plane.md
      - codex/roadmap/phase-10-scale-validation.md
    threats:
      - uncontrolled-cost
      - provider-rate-limit-exhaustion
      - queue-collapse
      - noisy-neighbor
      - cleanup-starvation
    control_requirements:
      - Apply per-job, campaign, tenant, provider, and system limits.
      - Apply backpressure before overload.
      - Preserve mandatory security and cleanup capacity.
      - Stop or pause work at hard cost boundaries.
    evidence_requirements:
      - budget-record
      - rate-limit-record
      - backpressure-event
      - cost-report
    validation_tests: []
    future_validation_required: true
    failure_behavior: block_phase
  - control_id: control-plane-emergency-stop
    title: Provide deterministic emergency stop
    domain: control-plane
    objective: >-
      Stop new work and contain affected operations after credential exposure, prohibited access, tenant-isolation failure, publisher violation, uncontrolled cost, or audit-integrity failure.
    severity: critical
    applies_to:
      - phase-9-campaigns-and-control-plane
      - phase-10-scale-validation
    policy_status: defined
    implementation_status: not_assessed
    validation_status: not_run
    requirement_references:
      - codex/roadmap/phase-9-campaigns-and-control-plane.md
      - codex/core/06-autonomy-and-stop-conditions.md
    threats:
      - continuing-after-security-incident
      - credential-persistence
      - repeated-prohibited-access
      - uncontrolled-external-effects
    control_requirements:
      - Prevent new leases and credential issuance.
      - Revoke affected credentials.
      - Permit only authorized containment and cleanup.
      - Require human security review before recovery.
    evidence_requirements:
      - security-incident-record
      - emergency-stop-event
      - credential-revocation-record
      - containment-record
    validation_tests: []
    future_validation_required: true
    failure_behavior: security_stop
  - control_id: cache-scope-and-integrity
    title: Scope caches by tenant, target, source, and capability
    domain: cache-security
    objective: >-
      Prevent stale, poisoned, cross-tenant, or cross-repository cache entries from satisfying current evidence, coverage, remediation, or publication requirements.
    severity: high
    applies_to:
      - phase-2-qualification-and-configuration
      - phase-3a-npm-monorepos
      - phase-3b-pnpm
      - phase-3c-yarn
      - phase-3d-tsx-and-frameworks
      - phase-4-python
      - phase-5-additional-language
      - phase-6-cross-repository
      - phase-7-contracts-and-microservices
      - phase-8-infrastructure-and-runtime
      - phase-9-campaigns-and-control-plane
      - phase-10-scale-validation
    policy_status: defined
    implementation_status: not_assessed
    validation_status: not_run
    requirement_references:
      - codex/roadmap/phase-10-scale-validation.md
      - codex/architecture/evidence-model.md
      - codex/architecture/coverage-model.md
    threats:
      - cross-tenant-cache-leak
      - stale-cache-use
      - cache-poisoning
      - authorization-bypass-through-cache
    control_requirements:
      - Include tenant, target, source revision, capability, tool, and configuration in cache keys.
      - Validate artifact integrity on read.
      - Reevaluate current policy and authorization after cache hits.
      - Invalidate dependent entries after material changes.
    evidence_requirements:
      - cache-key-record
      - cache-integrity-result
      - invalidation-record
      - policy-revalidation-record
    validation_tests: []
    future_validation_required: true
    failure_behavior: block_capability
  - control_id: scale-correctness-preservation
    title: Preserve correctness and safety under load
    domain: scale-security
    objective: >-
      Ensure increased repository count, concurrency, duration, or throughput does not weaken evidence, coverage, classification, authorization, tenant, audit, or publication controls.
    severity: critical
    applies_to:
      - phase-10-scale-validation
    policy_status: defined
    implementation_status: not_assessed
    validation_status: not_run
    requirement_references:
      - codex/roadmap/phase-10-scale-validation.md
      - codex/core/03-safety-invariants.md
    threats:
      - security-check-skipping-under-load
      - nondeterministic-classification
      - lost-evidence
      - false-complete-coverage
      - duplicate-external-effects
    control_requirements:
      - Use a correctness oracle for every scale profile.
      - Compare deterministic outputs across worker counts and completion order.
      - Preserve failed targets and partial coverage.
      - Stop when audit, tenant, credential, or publication controls fail.
    evidence_requirements:
      - scale-correctness-report
      - determinism-report
      - tenant-isolation-report
      - audit-integrity-report
    validation_tests: []
    future_validation_required: true
    failure_behavior: security_stop
  - control_id: scale-tested-limit-reporting
    title: Report only exact tested scale limits
    domain: scale-security
    objective: >-
      Prevent bounded benchmark results from being described as universal or enterprise-scale support.
    severity: high
    applies_to:
      - phase-10-scale-validation
    policy_status: defined
    implementation_status: not_assessed
    validation_status: not_run
    requirement_references:
      - codex/roadmap/phase-10-scale-validation.md
      - codex/core/10-reporting-and-state-policy.md
    threats:
      - unbounded-scale-claim
      - unlabeled-extrapolation
      - failed-limit-concealment
      - environment-identity-omission
    control_requirements:
      - Bind every scale claim to workload, dataset, environment, duration, and measured limits.
      - Separate measured facts, estimates, assumptions, and extrapolations.
      - Record failed and untested limits.
      - Use validated-within-profile status only for exact tested profiles.
    evidence_requirements:
      - tested-limit-table
      - benchmark-environment-record
      - workload-profile
      - capability-scale-status
    validation_tests: []
    future_validation_required: true
    failure_behavior: block_phase
  - control_id: reporting-truthfulness
    title: Require truthful evidence-backed reporting
    domain: reporting
    objective: >-
      Prevent unavailable, skipped, partial, failed, fixture-only, or planned behavior from being reported as passed, complete, functional, or generally supported.
    severity: critical
    applies_to:
      - all-phases
    policy_status: defined
    implementation_status: implemented
    validation_status: passed
    requirement_references:
      - codex/core/10-reporting-and-state-policy.md
      - codex/core/04-accuracy-and-evidence-policy.md
    threats:
      - false-pass
      - unsupported-capability-claim
      - fixture-only-generalization
      - blocker-concealment
    control_requirements:
      - Bind every material claim to retained evidence.
      - Record passed, failed, blocked, partial, skipped, unavailable, and untested states distinctly.
      - State exact capability boundaries and limitations.
      - Never claim perfect dead-code detection.
    evidence_requirements:
      - phase-report-validation
      - capability-status-record
      - test-result-record
      - limitation-record
    validation_tests:
      - manifest_path: codex/tests/phase-0-tests.yaml
        test_ids:
          - p0-phase-report-truthfulness
      - manifest_path: codex/tests/phase-1-tests.yaml
        test_ids:
          - p1-phase-report-truthfulness
    failure_behavior: block_phase
  - control_id: reporting-execution-state-nonauthority
    title: Keep execution state descriptive and non-authorizing
    domain: reporting
    objective: >-
      Ensure CODEX_EXECUTION_STATE.md records current work and blockers without granting permission to continue, remediate, publish, or enter another phase.
    severity: critical
    applies_to:
      - all-phases
    policy_status: defined
    implementation_status: implemented
    validation_status: passed
    requirement_references:
      - codex/core/10-reporting-and-state-policy.md
      - codex/core/05-phase-authorization-protocol.md
    threats:
      - execution-state-generated-authorization
      - automatic-phase-continuation
      - stale-state-use
      - blocker-omission
    control_requirements:
      - Record authorization status explicitly.
      - Record repository revision, worktree state, tests, failures, cleanup, and external state.
      - State that the record does not authorize future work.
      - Require new explicit authorization for the next phase.
    evidence_requirements:
      - execution-state-validation
      - authorization-record
      - phase-handoff-record
    validation_tests:
      - manifest_path: codex/tests/phase-0-tests.yaml
        test_ids:
          - p0-execution-state-handoff
          - p0-phase-1-remains-unauthorized
      - manifest_path: codex/tests/phase-1-tests.yaml
        test_ids:
          - p1-execution-state-handoff
          - p1-phase-2-remains-unauthorized
    failure_behavior: block_phase
