assessment_rules:
  control_pass_requires:
    - implementation_status_is_implemented
    - validation_status_is_passed
    - required_evidence_is_current
    - policy_references_are_current
    - no_open_blocking_exception
  control_partial_when:
    - implementation_is_partial
    - validation_is_partial
    - one_or_more_required_profiles_are_unvalidated
    - evidence_is_current_but_scope_is_limited
  control_failed_when:
    - validation_detects_control_bypass
    - required_evidence_is_missing
    - secret_exposure_is_detected
    - tenant_isolation_fails
    - excluded_repository_target_operation_is_performed
    - unauthorized_external_operation_occurs
    - audit_integrity_fails
  stale_when:
    - policy_changes
    - control_implementation_changes
    - test_manifest_changes_materially
    - runner_profile_changes
    - credential_model_changes
    - trust_boundary_changes
    - validation_environment_changes_materially
exceptions:
  allowed: true
  requirements:
    - explicit-human-authorization
    - exact-control-id
    - exact-scope
    - documented-risk
    - compensating-controls
    - expiration
    - audit-record
  cannot_override:
    - permanent-safety-invariants
    - prohibited-repository-policy
    - secret-value-protection
    - tenant-isolation
    - default-branch-push-prohibition
    - merge-prohibition
    - human-disposition-separation
    - remediation-authorization-separation
    - truthful-reporting
reporting:
  record_each_control: true
  record_policy_status: true
  record_implementation_status: true
  record_validation_status: true
  record_evidence_identities: true
  record_failed_controls: true
  record_partial_controls: true
  record_unvalidated_controls: true
  record_exceptions: true
  record_cleanup: true
  redact_secrets: true
  prohibit_false_pass: true
  phase_completion_requires_all_blocking_controls: true
metadata:
  owner: dcav2-governance
  reviewers:
    - human-phase-authorizer
    - human-security-reviewer
  notes: >-
    This matrix is normative security-control configuration. It does not activate any phase and does not grant repository, credential, external operation, remediation, publication, infrastructure, deployment, merge, or destructive-operation authority.
